  \ They didn't care. Lot 7, Henri's life's work, ended up at a chain restaurant in\
  \ New Brunswick, served alongside bacon and eggs for four dollars a litre.\nHenri\
  \ is still upset about this.\nHis lawyer was not unavailable for comment.\nA careful\
  \ phrasing.\nOver the course of roughly a year, from late 2011 to mid-2012, JP Bouchard's\
  \ crew stole more than three thousand tons of maple syrup from the Federation's\
  \ strategic reserve. The total value: eighteen point seven million dollars.\nEnough\
  \ syrup to cover every pancake in Canada for... probably about a week.\nThe syrup\
  \ was trafficked in small batches. Mixed with legally sourced product. Distributed\
  \ across four provinces and into the northeastern United States. The money was laundered\
  \ through a network of shell companies and sympathetic dealers. It was, by any measure,\

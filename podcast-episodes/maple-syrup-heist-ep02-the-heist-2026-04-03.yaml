  \ barrel of Grade A amber. Or so they thought.\nMaple syrup, as it turns out, does\
  \ have fingerprints. Chemical ones.\nBut we'll get to that. In episode four.\n[Ad\
  \ Break]\n  Have you witnessed syrup-related crimes? Are you afraid of retaliation\
  \ from Big Maple?\n  The Maple Witness Protection Program offers complete relocation\
  \ services for syrup informants. New identity. New province. Unlimited pancakes.\n\
  \  We relocated over forty-seven witnesses last year. Not one has been found. Mostly\

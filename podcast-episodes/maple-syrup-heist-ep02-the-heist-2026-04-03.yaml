transcript: "Last time on The Sticky Fingers, we met the Federation of Quebec Maple\
  \ Syrup Producers — a legal cartel controlling seventy-seven percent of the world's\
  \ maple syrup supply. We learned about their strategic reserve: thirty million dollars\
  \ in syrup, stored in a nondescript warehouse in the Quebec countryside, protected\

  \ Funded by the Canadian Department of Breakfast Security.\n  Call now. Operators\
  \ are standing by. They're also having waffles.\n[End Ad Break]\nSo by the summer\
  \ of 2012, the operation was running smoothly. JP Bouchard was getting rich. Luc\

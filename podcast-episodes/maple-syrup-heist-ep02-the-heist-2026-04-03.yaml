  \ with the keys. Cousin Raymond, who cannot keep a secret. And Big Mike Michaud,\
  \ a trucker who thought he was hauling trees.\nHe was not hauling trees.\nNo, Danny.\
  \ He was not. This is The Sticky Fingers. I'm Marc Thibodeau. And today, we're going\
  \ to tell you exactly how they did it.\nAll three thousand tons of it.\nWhat happened\
  \ next was the largest agricultural theft in Canadian history. And it started with\
  \ a hand pump and a garden hose.\nEvery great crime begins at the hardware store.\n\
  It was October 2011. The leaves had turned. The tourists had gone home. The warehouse\
  \ in Saint-Louis-de-Blandford sat in the flat grey countryside like a forgotten\
  \ shipping container, which, in many ways, is exactly what it was. Inside: row after\
  \ row of steel barrels, stacked three high, each one containing six hundred pounds\
  \ of Grade A maple syrup. The Federation's strategic reserve. Canada's liquid gold.\
  \ And it had no alarm system.\nNone.\nNo security cameras.\nZero.\nSteve, the security\
  \ guard, clocked out at five PM sharp every day. He was a man of routine. A man\
  \ of principle. A man who did not work overtime.\nSteve had boundaries. You have\
  \ to respect that.\nSo the plan was elegant in its simplicity. Luc Desmarais had\
  \ the keys. He was a licensed dealer, authorized to enter the warehouse during business\
  \ hours to inspect product. But nobody checked whether he came back after dark.\
  \ Nobody checked anything. Under cover of darkness, JP and Luc would enter the warehouse.\
  \ They'd select barrels from the back rows — the ones least likely to be inspected.\
  \ Using hand pumps and lengths of garden hose purchased from a Canadian Tire in\
  \ Drummondville, they would siphon the syrup out of the steel barrels and into plastic\
  \ totes. Then they'd refill the original barrels with water, reseal them, and put\
  \ them back exactly where they found them.\nThe barrels still weighed six hundred\
  \ pounds. They just weren't worth eighteen hundred dollars anymore.\nEach barrel\
  \ held roughly six hundred pounds of syrup, valued at approximately six hundred\
  \ and fifty dollars wholesale. They could do four barrels a night. That's twenty-six\
  \ hundred dollars in syrup, every single night, and nobody was the wiser.\nFor context,\
  \ six hundred pounds is the weight of three adult beavers. Give or take.\nI'm not\
  \ going to verify that.\nYou don't have to. It's roughly correct.\nThe syrup needed\
  \ to move. You can't just stack twenty thousand pounds of stolen maple syrup in\
  \ your garage. Well, you can. JP did, briefly. But it's not a long-term solution.\
  \ For that, they needed a trucker. They needed Big Mike.\nWe spoke with Big Mike\
  \ Michaud about his first run.\nJP calls me up. Middle of the week. Says he needs\
  \ me to drive some product. I ask what kind. He says, and I remember this very clearly,\
  \ he says, \"It's syrup, Mike.\" And I said, \"Like, maple syrup?\" And he said,\
  \ \"What other kind of syrup is there, Mike?\" Which, fair point.\nThat first shipment\
  \ was twenty thousand pounds. Plastic totes loaded into a refrigerated trailer.\
  \ The route: Saint-Louis-de-Blandford to Brampton, Ontario. Five hours through the\
  \ night.\nYou ever driven through northern Ontario at three in the morning with\
  \ twenty thousand pounds of stolen syrup? It is very quiet. And you have a lot of\
  \ time to think about your life choices. The highway is empty. The trees are black.\
  \ Every set of headlights coming toward you, you think, that's it, that's the police.\
  \ But it never is. It's just another trucker hauling lumber or auto parts or whatever\
  \ normal people haul.\nBig Mike made the run without incident. Almost.\nI got pulled\
  \ over once. In Hawkesbury. Right near the Ontario border. OPP officer. Routine\
  \ check. He asks what I'm carrying. And I look at him and I say, \"Artisanal water.\
  \ From Quebec. Very exclusive.\" And he looked at the manifest, and he looked at\
  \ me, and he said, \"Have a good night.\" And that was that.\nTo be fair, artisanal\
  \ water from Quebec is a thing that exists.\nIt absolutely is. You can buy it at\
  \ Whole Foods.\nTwelve dollars a bottle.\nThe officer was very polite about it.\
  \ He shone his flashlight on the totes. They were opaque. He didn't open them. I\
  \ think he just wanted to make sure I wasn't hauling something dangerous. And I\
  \ suppose, technically, maple syrup is not dangerous. Unless you're the Federation.\n\
  Big Mike made fourteen runs that first winter. Always the same route. Always between\

transcript: "Welcome back to *Tides & Timbers.* I'm your host, and this is Part Two\
  \ of our three-part deep dive into Lunenburg, Nova Scotia. In Part One, we traced\
  \ the town's extraordinary origins — the German settlers who crossed an ocean and\
  \ became fishermen, the rebellions and pirate raids, the Bluenose, the UNESCO designation.\
  \ If you haven't listened to Part One yet, go back and do that. You'll thank me.\
  \ But today, we step out of the archives and onto the *actual streets.* What is\
  \ Lunenburg like right now? What does it mean to live in a UNESCO World Heritage\
  \ Site in 2026? Who calls this place home, and what keeps them here — and what keeps\
  \ others away? Because the honest answer is: Lunenburg is gorgeous, beloved, and\
  \ under serious pressure. And the tensions playing out here are not unique to this\
  \ town — they're the tensions of our time. Heritage versus affordability. Tourism\
  \ versus authenticity. Preservation versus progress. Let's take a walk.\nFirst,\
  \ let's set the scene. Lunenburg is *small.* Population: roughly **2,400 people.**\
  \ That's it. About the size of a mid-size apartment building in Toronto. On a busy\
  \ summer day, the number of tourists walking the streets can easily outnumber the\
  \ residents. The town skews older — the average age here is **52.2 years,** and\
  \ more than a third of residents are seniors. That's not surprising for a place\
  \ where the economy has historically been shaped by industries — fishing, shipbuilding\
  \ — that have shed jobs over the decades. Young people leave to find work, and retirees\
  \ arrive to find beauty. The median household income sits at around **$63,200 a\
  \ year** — not poverty by any stretch, but not wealthy either, especially given\
  \ what has happened to property values. Because here is the jaw-dropping statistic:\
  \ between 2019 and 2022 — just three years — the median home price in Lunenburg\
  \ increased by **105 percent.** One hundred and five percent. During the same period\
  \ it had risen only 22% in the preceding three years. The pandemic-era migration\
  \ surge, when remote workers fled cities for scenic small towns with fast internet,\
  \ hit places like Lunenburg *hard.* Today, an estimated **99 percent** of single-person\
  \ households in town earn below the income required to afford the median home sale\
  \ price. Ninety-nine percent. So if you want to live alone in Lunenburg and own\
  \ your home — statistically, good luck. The colourful houses look great on Instagram.\
  \ Affording them is another story.\nNow let's talk about the elephant in the harbour\
  \ — or rather, the **$46 million** elephant. Being a UNESCO World Heritage Site\
  \ is, on the surface, a tremendous honour. The designation attracts tourists, raises\
  \ the town's global profile, and commits the community to maintaining its architectural\
  \ character. But it comes with costs that a town of 2,400 people was never built\
  \ to absorb on its own. The town has identified **ten major heritage assets** —\
  \ public buildings, historic structures, key infrastructure — that require maintenance\
  \ and repair totalling an estimated $46 million. For context: Lunenburg's entire\
  \ annual municipal budget is a fraction of that. This isn't a theoretical problem.\
  \ Buildings are aging. Maintenance has been deferred. The bill is coming due. Heritage\
  \ preservation in Lunenburg means strict rules about what you can and can't do to\
  \ your property. Colours, materials, window styles, roof lines — all regulated.\
  \ For homeowners, this can mean that fixing a rotting window frame costs twice what\
  \ it might anywhere else, because you're required to use heritage-appropriate materials\
  \ and methods. Nothing says \"charming small town\" like a heritage compliance form.\
  \ And the tensions aren't just financial. In 2024, the town council was considering\
  \ developing a nine-hectare parcel of land called **Blockhouse Hill** — building\
  \ about 250 new housing units to address the affordability crisis. Sounds reasonable,\
  \ right? The problem: any significant new development on or near the historic hillside\
  \ risked triggering a review by UNESCO that could potentially affect the town's\
  \ World Heritage designation. Council ultimately reversed course and halted the\
  \ development plan. Housing need on one hand. UNESCO status on the other. There's\
  \ no easy answer when your most valuable asset is also your biggest constraint.\n\
  [Ad Break]\n  Attention homeowners in UNESCO-protected zones! Are you tired of accidentally\
  \ using the *wrong shade of heritage ochre* on your window trim?\n  Introducing\
  \ **Heritage Paint: The Hot Line** — a 24-hour emergency consultation service staffed\
  \ by architectural historians.\n  Call now and a certified Colour Compliance Officer\
  \ will talk you through the crisis. Is that Gamboge or Old Gold? We'll know.\n \
  \ We're also available for sobbing. Because sometimes heritage preservation IS that\
  \ emotional.\n  Heritage Paint: The Hot Line. Operators are standing by — in period-appropriate\
  \ clothing.\n[End Ad Break]\nOkay. Enough hard news. Let's talk about what makes\
  \ Lunenburg *genuinely wonderful* to visit and — for those who can afford it — to\
  \ live in. The arts scene here is astonishing for a town this size. About **10 percent\
  \ of local businesses** are in some way connected to the arts — galleries, pottery\
  \ studios, craft shops, design studios. There are at least **eight art galleries**\
  \ within the Old Town. The streets attract creative people the way lighthouses attract\
  \ ships, and that critical mass of artists and makers gives Lunenburg a cultural\
  \ vitality that punches far above its demographic weight. Then there are the festivals.\
  \ The **Lunenburg Folk Harbour Festival** — Nova Scotia's longest-running folk music\
  \ festival — takes over the town every August, filling the waterfront with traditional\
  \ and contemporary folk from across Canada and beyond. Picture a warm Maritime evening,\
  \ a glass of local wine, and a fiddle echoing off 250-year-old buildings. It's genuinely\
  \ magical. There's also the **Festival of Crafts,** the **Street Art Festival,**\
  \ and the **Folk Art Festival** — which brings together the distinctly Nova Scotian\
  \ tradition of folk art: brightly painted wooden sculptures, whirligigs, hand-carved\
  \ fish, and the kind of work that is deeply rooted in the same German and Acadian\
  \ traditions that shaped this community. And of course there is the **Fisheries\
  \ Museum of the Atlantic** — one of the finest maritime museums in Canada — sitting\
  \ right on the waterfront. The museum tells the story of the Grand Banks fishery,\
  \ of the dorymen who worked in brutal conditions for generations, and of the Bluenose\
  \ herself. Bluenose II — the replica schooner — docks here when she's not sailing,\
  \ and you can tour her decks. The waterfront is still a *working* harbour. This\
  \ is important to understand. Lunenburg didn't hollow itself out and become a theme\
  \ park. Fishing boats still come in and unload their catch. The smells are real.\
  \ The industry is real — if reduced from its peak. This is a living town, not a\
  \ preserved specimen.\nBut tourism — and the tensions it creates — are impossible\
  \ to ignore. Lunenburg draws visitors from around the world. On a peak summer weekend,\
  \ the streets of a town of 2,400 can feel *crowded.* The harbour fills with sailboats\
  \ and whale-watching vessels. The restaurants and galleries do brisk business. The\
  \ local economy depends on those tourist dollars. But the mayor has had to publicly\
  \ acknowledge that Lunenburg has a serious **RV problem.** Large motorhomes — some\
  \ of them enormous — cram onto the narrow historic streets that were designed for\
  \ horses and foot traffic in the 18th century. Overnight \"boondocking\" — parking\
  \ an RV and sleeping in it without paying for a campground — has become such a problem\
  \ that the town has struggled to find solutions. Imagine planning a romantic getaway\
  \ to a UNESCO World Heritage Site and waking up next to a 40-foot diesel motorhome\
  \ with a satellite dish. There's also a deeper, more philosophical tension in the\
  \ tourism boom: the risk that as Lunenburg becomes more famous, it becomes less\
  \ *itself.* That the authentic fishing community gets slowly replaced by boutique\
  \ shops and vacation rentals. That the people who actually built and sustained this\
  \ culture get priced out of it. It's not a uniquely Lunenburg problem — it's happening\
  \ in beautiful historic towns everywhere. But it feels more acute here, because\
  \ so much of what makes Lunenburg worth preserving is not just the buildings — it's\
  \ the *people* and the *community* they sustain.\n[Ad Break]\n  Do you own a historically\
  \ significant property but find that tourists keep photographing your house at six\
  \ in the morning?\n  We've all been there.\n  Introducing **Heritage Home Camo**\
  \ — the first service that installs temporary, architecturally accurate facades\
  \ over your actual house so you can enjoy total privacy!\n  Looks like an 18th-century\
  \ colonial from the outside. Feels like a normal house on the inside.\n  UNESCO-compliant.\
  \ Tourist-repellent. Legally ambiguous.\n  Heritage Home Camo. You deserve to exist\
  \ in your own home.\n[End Ad Break]\nDespite the pressures, there is something about\
  \ Lunenburg that continues to draw people — and to hold them. Residents describe\
  \ a quality of life that's genuinely hard to replicate. In a town of 2,400, you\
  \ know your neighbours. You know your butcher, your pharmacist, your local councillor.\
  \ Community is not an abstraction — it is Tuesday afternoon at the farmers' market,\
  \ or Saturday morning at the harbour watching the fishing boats. The town has won\
  \ the **Communities in Bloom** award for most beautiful small town in Canada. It's\
  \ the kind of designation that gets mocked until you stand on the waterfront and\
  \ look up at the hill — the Crimson and ochre and sage-green houses rising above\
  \ the masts, the church steeples poking above the roofline, the water reflecting\
  \ it all back — and then you understand completely. There is also something quietly\
  \ remarkable about the **continuity** here. Lunenburg families have been fishing,\
  \ building, and running businesses from the same streets for six, seven, eight generations.\
  \ Last names you see on storefronts today are names that appear in the archives\
  \ from the 1760s. That kind of deep-rooted community identity is vanishingly rare\
  \ in modern North America. And the food — I'd be remiss not to mention the food.\
  \ Lunenburg sausage — a spiced smoked pork sausage that is a direct descendant of\
  \ German butchering traditions brought over in 1753 — is a regional institution.\
  \ You can still buy it from local butchers. It is delicious and it is *history on\
  \ a plate.* Don't sleep on the fish chowder either.\nLunenburg in 2026 is a place\
  \ caught in a beautiful, difficult tension — between its past and its future, between\
  \ authenticity and accessibility, between the needs of its residents and the desires\
  \ of the world that has fallen in love with it. It is not a solved problem. It's\
  \ an ongoing negotiation, conducted in town council chambers and heritage committees\
  \ and coffee shops and on the street corners of a 270-year-old grid. And the people\
  \ doing that work — the residents, the councillors, the artists, the fishermen,\
  \ the newcomers and the old families — are trying to hold onto something genuinely\
  \ irreplaceable. I find that admirable. And I find the fact that it's *hard* to\
  \ be entirely the point. In Part Three — and this is the one I've been most excited\
  \ to make — we go into the *shadows.* The ghost stories of Lunenburg. The esoteric\
  \ traditions. The folklore and the mysteries. The things the town doesn't put on\
  \ its official tourism brochure, but that have been whispered around harbours and\
  \ firesides for centuries. Trust me. You want to hear Part Three. I'm your host\
  \ — thanks for listening to *Tides & Timbers.* Subscribe wherever you find your\
  \ podcasts, and we'll see you in the dark.\n- Point2Homes — Lunenburg NS Demographics:\

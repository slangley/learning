transcript: "On the morning of June 21st, 1749, a fleet of fourteen transports and\
  \ three warships rounded the headland of Chebucto Harbour on the eastern coast of\
  \ Nova Scotia, and what the men on deck saw stopped them. The harbour was enormous\
  \ — one of the largest natural ice-free harbours in the world, deep enough for the\
  \ biggest ships of the age, sheltered enough to anchor a fleet in almost any weather.\
  \ A long drumlins ridge ran along the western shore, steep enough to fortify, commanding\
  \ every approach by water. Colonel Edward Cornwallis, commander of the expedition,\
  \ looked at that ridge and began calculating. Aboard those fourteen transports were\
  \ approximately 2,500 people — soldiers, tradespeople, former soldiers from the\
  \ recent wars with France, their wives and children. They had been recruited in\
  \ the taverns and dockyards of Britain with promises of free land, free food for\
  \ a year, and a chance to build something new. Many of them had no idea what they\
  \ were sailing into. Some had never left England. All of them were about to spend\
  \ their first winter in a place that would test them in ways the recruitment posters\
  \ had certainly not mentioned. Welcome back to *The Warden of the North*. This is\
  \ Episode 2 — \"The Fortress City.\" Last time, we followed the Mi'kmaq and the\
  \ Acadians through the long centuries before the British arrived. Now the British\
  \ have arrived. And they mean to stay.\nTo understand Halifax, you have to understand\
  \ the strategic logic that brought it into existence. Because this was not a settler\
  \ colony in any traditional sense. There was no particular gold rush, no particular\
  \ religious exile driving it. Halifax was founded as a military-strategic counter-move.\
  \ Here is the problem the British were solving. France had Louisbourg. Louisbourg\
  \ was a massive, heavily fortified port on the eastern tip of Cape Breton Island\
  \ — just a few hundred kilometres northeast of where Halifax now sits. It guarded\
  \ the entrance to the St. Lawrence River, the main route into the interior of French\
  \ Canada. It was one of the most expensive fortifications ever built in North America,\
  \ and it was very, very good at what it did, which was to project French naval power\
  \ across the North Atlantic fisheries and threaten British shipping. The British\
  \ needed a counter. They needed a fortified port of their own on the Atlantic coast\
  \ of Nova Scotia — one that could house a fleet, supply it, repair it, and serve\
  \ as the military and administrative capital of a province they had been claiming\
  \ since 1710 but had never really controlled. They needed, in other words, Halifax.\
  \ Parliament voted forty thousand pounds for the project — a substantial sum — and\
  \ appointed Edward Cornwallis as the governor of Nova Scotia and the man to make\
  \ it happen. Cornwallis was forty years old, a veteran of the brutal Jacobite suppression\
  \ in Scotland after the 1745 uprising. He knew how to impose order. He knew how\
  \ to build. And he knew that what he was founding was not simply a town but a strategic\
  \ instrument of imperial policy. When his fleet entered the harbour on that June\
  \ morning, he named it Halifax — after the Earl of Halifax, president of the Board\
  \ of Trade and Plantations, who had championed the project in London. Then he put\
  \ his 2,500 settlers to work.\nThe speed at which Halifax went from empty hillside\
  \ to functioning colonial capital is remarkable. Within days of landing, trees were\
  \ being felled, streets were being laid out in a grid pattern — that original grid\
  \ still forms the bones of the downtown — and a palisade wall was going up around\
  \ the perimeter. The settlers worked because they had to. Winter was coming. They\
  \ built fast and they built rough. The first structures were little more than timber\
  \ shelters. Disease moved through the settlement quickly — scurvy, typhus, the general\
  \ miseries of crowded colonial life. A significant number of those original 2,500\
  \ settlers did not survive the first year. By the end of the decade, waves of replacement\
  \ settlers had been brought in — German Protestant settlers, called the Foreign\
  \ Protestants, who founded the town of Lunenburg further down the coast in 1753\
  \ and became the agricultural backbone of the colony. But the most immediate problem\
  \ was not disease or winter. It was the Mi'kmaq. We talked in the last episode about\
  \ Cornwallis's 1749 Scalp Proclamation — the bounties offered for Mi'kmaq scalps.\
  \ It bears dwelling on for a moment, because it tells you something important about\
  \ the logic of colonialism in this period. The Mi'kmaq were raiding British settlements,\
  \ burning outlying farms, killing settlers who wandered too far from the palisade.\
  \ From their perspective, they had been given no say in whether this city would\
  \ be built on their land, and they were watching it rise anyway. From Cornwallis's\
  \ perspective, the raids were an obstacle to be removed. The proclamation was not\
  \ an aberration. It was policy. The British had used similar measures in Scotland,\
  \ in Ireland. The idea was to make the cost of resistance so catastrophically high\
  \ that resistance would stop. It didn't work in Nova Scotia the way Cornwallis hoped.\
  \ The Mi'kmaq kept raiding. Cornwallis eventually left — replaced as governor in\
  \ 1752 — but the Scalp Proclamation remained on the books for years. Halifax grew\
  \ anyway. By the mid-1750s it had a newspaper — the *Halifax Gazette*, founded in\
  \ 1752, the first newspaper published in what is now Canada. It had a proper legislature\
  \ — Canada's first elected assembly met in Halifax in 1758. It had taverns, churches,\
  \ a growing merchant class. It had the bones of something permanent. And then the\
  \ war it had been built to fight finally arrived.\n[Ad Break]\n  Tired of building\
  \ an entire colonial capital from scratch with only hand tools and a palisade fence?\n\
  \  Introducing FortifyFast™ — the pre-assembled British colonial town kit!\n  Everything\
  \ you need: grid streets, a gazette, three taverns, and one deeply controversial\
  \ governor!\n  Scalp Proclamation sold separately. We don't endorse that part.\n\
  \  FortifyFast™. Because empire waits for no one!\n[End Ad Break]\nThe Seven Years'\
  \ War is one of those conflicts that gets underplayed in North American history\
  \ classes. Winston Churchill called it the first world war — it was fought on five\
  \ continents, involved every major European power, and its outcome reshaped the\
  \ world in ways we are still living with. In North America, it was the war that\
  \ decided whether the continent would be British or French. And Halifax was the\
  \ hinge on which that decision turned. The war in North America is usually dated\
  \ from 1754, though it escalated dramatically after the formal European declarations\
  \ in 1756. British strategy was straightforward: strangle French Canada by cutting\
  \ it off from the sea. That meant taking Louisbourg. And taking Louisbourg meant\
  \ using Halifax as the staging base. In 1758, a British force of roughly 12,000\
  \ soldiers and 10,000 sailors — an enormous armada for the period — assembled in\
  \ Halifax harbour before sailing northeast to Cape Breton. The siege of Louisbourg\
  \ lasted seven weeks. When it fell on July 26th, 1758, the St. Lawrence was open.\
  \ The following year, General James Wolfe led his army up the river to Quebec. On\
  \ September 13th, 1759, on the Plains of Abraham outside Quebec City, the war in\
  \ Canada was effectively decided in a battle that lasted less than fifteen minutes.\
  \ Both Wolfe and the French commander Montcalm died of their wounds. New France\
  \ was finished. The Treaty of Paris in 1763 transferred almost all of France's North\
  \ American possessions to Britain. The continent was now, overwhelmingly, British.\
  \ And Halifax — the city that had been founded specifically to make this possible\
  \ — now found itself at the centre of a changed world. There was a dark coda to\
  \ the victory in Halifax's immediate vicinity. The fall of Louisbourg in 1758 brought\
  \ the final wave of Acadian deportations — the communities that had survived or\
  \ hidden from the 1755 expulsion were now hunted down systematically. The British\
  \ burned every French settlement they could find on the Atlantic coast of Nova Scotia.\
  \ The land was swept clean. It is a strange thing to reckon with — that a city founded\
  \ in 1749 became, within a decade of its founding, the administrative centre from\
  \ which the British completed one of the largest forced population removals in North\
  \ American colonial history. Halifax did not exist before 1749. By 1764, the culture\
  \ that had lived on this land for 150 years before the British arrived had been\
  \ shattered, scattered, or suppressed. What came next was something new, built on\
  \ that scarred ground.\n[Ad Break]\n  So you're telling me a single harbour changed\
  \ the political geography of an entire continent?\n  That's what harbours do. They've\
  \ been doing it for thousands of years.\n  I feel like someone should have told\
  \ me this in school.\n  Someone did. You were probably thinking about lunch.\n \
  \ Fair. This is why you listen to podcasts.\n[End Ad Break]\nIn the decades after\
  \ the Seven Years' War, Halifax consolidated its role as the military and commercial\
  \ capital of British North America's Atlantic coast. The harbour hummed with naval\
  \ traffic. The Citadel — the star-shaped fortress that still crowns the hill above\
  \ the downtown — was expanded and rebuilt multiple times through the late 1700s\
  \ and early 1800s. The British understood that whatever else happened on this continent,\
  \ they needed Halifax. The American Revolution accelerated everything. When the\
  \ thirteen colonies to the south declared independence in 1776, Halifax became,\
  \ almost overnight, the anchor of what remained of British North America. It was\
  \ the primary naval base from which the British conducted operations throughout\
  \ the war. And when the war ended in 1783 with American independence, something\
  \ unexpected happened to Halifax. The Loyalists arrived. Tens of thousands of colonists\
  \ who had remained loyal to the Crown — who had backed the wrong side, as far as\
  \ the new United States was concerned — were expelled or fled from their homes.\
  \ Roughly 35,000 of them came to Nova Scotia. Entire communities materialized seemingly\
  \ overnight. The population of Nova Scotia nearly doubled in the space of a few\
  \ years. These were not rough settlers. Many were educated, prosperous, connected.\
  \ They brought skills, capital, and an intense desire to prove that a British North\
  \ America could succeed — that everything they had sacrificed their former lives\
  \ for had been worth it. They also brought deep prejudices and social hierarchies\
  \ that would shape Nova Scotia for generations. Halifax at the end of the 18th century\
  \ was a city of striking contrasts. Military grandeur and waterfront squalor. Merchant\
  \ wealth and grinding poverty. A growing free Black community — many of them former\
  \ American slaves who had been promised freedom in exchange for fighting for the\
  \ British — living in settlements outside the city without the rights and land that\
  \ had been promised to them. The promises made and broken to Black Nova Scotians\
  \ in these years are a thread that runs all the way through this history, and we'll\
  \ follow it in a later episode to its most painful expression. But for now, let's\
  \ note what Halifax had become by 1800: a fortified port city at the edge of the\
  \ Atlantic, tested by war, shaped by waves of dispossessed humanity, and about to\
  \ enter the most prosperous and swashbuckling period of its history. Because war,\
  \ as Halifax was about to discover, could be very good for business.\nIn the next\
  \ episode, we're going to talk about money. Specifically, about the extraordinary\
  \ windfall that fell on Halifax when the whole world went to war — first with Napoleon,\
  \ then with each other in the War of 1812. We're going to talk about privateers\
  \ — legally sanctioned pirates, essentially — and about a small schooner from Liverpool,\
  \ Nova Scotia, called the *Liverpool Packet*, that became the most feared vessel\
  \ on the North Atlantic. Halifax in the early 1800s was loud, dangerous, prosperous,\
  \ and drunk. In the best possible way. This is *The Warden of the North*. Episode\
  \ 3 is coming. Don't go far.\n- Wikipedia — History of Halifax, Nova Scotia (https://en.wikipedia.org/wiki/History_of_Halifax,_Nova_Scotia)\

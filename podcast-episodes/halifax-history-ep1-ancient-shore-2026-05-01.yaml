transcript: "Stand at the waterfront in Halifax today — at the edge of that enormous\
  \ harbour — and if you let yourself, you can feel how old this place is. Not old\
  \ in the way that cities in Europe feel old. Not the comfortable weight of cathedrals\
  \ and cobblestones. Old in a different way. A rawer way. A way that reminds you\
  \ that this land was shaped by forces and peoples and collisions that most of us\
  \ learn almost nothing about. Welcome to *The Warden of the North: A History of\
  \ Halifax*. Over six episodes, we're going to travel the full arc of this city and\
  \ this province — from a world before European contact to the Halifax you can walk\
  \ around in today. And we're not going to rush it. There's too much here to rush.\
  \ Halifax has been a fortress, a refugee camp, a powder keg — literally — and through\
  \ all of it, it has remained one of the most strategically vital pieces of real\
  \ estate in North America. But before we can talk about the city the British founded\
  \ in 1749, we have to go back much, much further. Because the story of Halifax doesn't\
  \ start with a British colonel planting a flag on a hillside. It starts roughly\
  \ ten thousand years ago, with people who had already figured out how to live in\
  \ this difficult, beautiful corner of the world. This is Episode 1. We're starting\
  \ at the beginning.\nTen thousand years. Let that sit for a moment. While the civilizations\
  \ we learned about in school — Egypt, Greece, Rome — were rising and falling and\
  \ rising again, people were living on this peninsula, fishing these waters, reading\
  \ these tides. They called their homeland *Mi'kma'ki*. And they called themselves\
  \ *Mi'kmaq* — the people. Their territory stretched across what we now know as Nova\
  \ Scotia, New Brunswick, Prince Edward Island, parts of Newfoundland, and the Gaspé\
  \ Peninsula in Québec. By almost any measure, this was one of the most resource-rich\
  \ coastal environments on the planet. The Bay of Fundy, which forms the western\
  \ edge of what is now Nova Scotia, has the highest tides on Earth — in some places,\
  \ the water rises and falls more than sixteen metres twice a day. To live here,\
  \ you didn't fight that kind of power. You learned to work with it. The Mi'kmaq\
  \ organized their world into seven districts, each governed by a district chief,\
  \ and all seven chiefs together formed the Mi'kmaq Grand Council — a governing body\
  \ that operated by consensus. Not by decree, not by the word of a single king, but\
  \ by agreement. Historians of governance sometimes point to this as one of the most\
  \ sophisticated political structures in pre-contact North America. Their spiritual\
  \ world was equally complex. The Mi'kmaq did not draw a firm line between the natural\
  \ and the supernatural. Everything — the sun, the rivers, the rocks, the animals\
  \ — had spirit. The universe was animated. The figure of *Glooscap*, or *Klu'skap*,\
  \ was central — a great being who taught the people how the world had come into\
  \ being, and how to live within it well. Their knowledge of medicinal plants, of\
  \ seasonal migration patterns, of where the salmon ran and where the moose bedded\
  \ down in winter — this was the accumulated wisdom of hundreds of generations. And\
  \ then, one day, the ships came. The exact moment is hard to pin down. There were\
  \ almost certainly Norse contact points centuries before. Giovanni Caboto — the\
  \ explorer we call John Cabot — almost certainly encountered Mi'kmaq people when\
  \ he sailed these waters in 1497 on behalf of the English Crown. But sustained contact\
  \ with Europeans arrived with the French in the early 1600s. And for the Mi'kmaq,\
  \ the French were a revelation — because the French, at least at first, were not\
  \ interested in taking their land. The French wanted fur. They wanted fish. They\
  \ wanted trade partners. And the Mi'kmaq were exceptional trade partners. A commercial\
  \ relationship grew — and with it, something the Mi'kmaq had never encountered before:\
  \ genuine cultural exchange. French settlers learned from the Mi'kmaq how to survive\
  \ these winters, how to navigate these rivers, how to read the landscape. And the\
  \ Mi'kmaq adopted certain French goods, French tools, even elements of French religion.\
  \ Intermarriage happened. Children were born who moved comfortably between both\
  \ worlds. It was imperfect, as all human contact is imperfect. But by the standards\
  \ of European colonialism in the 1600s, the relationship between the Mi'kmaq and\
  \ the French settlers of Acadia was remarkably close to something resembling mutual\
  \ respect. Which makes what came next all the more catastrophic.\n[Ad Break]\n \
  \ Are you tired of understanding history the hard way — by actually thinking about\
  \ it?\n  Introducing HistoryPaste™! Just smear our pre-digested historical facts\
  \ directly onto your forehead!\n  No reading. No context. No troubling moral ambiguity!\n\
  \  Side effects may include strong opinions at dinner parties and an inexplicable\
  \ urge to visit Halifax.\n  HistoryPaste™. Because the past is *someone else's*\
  \ problem!\n[End Ad Break]\nPort-Royal. 1605. Samuel de Champlain and Pierre du\
  \ Gua de Monts establish a permanent French settlement on the shores of the Annapolis\
  \ Basin — on the western side of what is now Nova Scotia. It is the first permanent\
  \ European settlement north of Florida in North America. Let that land in your brain\
  \ for a second. Not Plymouth Rock. Not Jamestown. *Port-Royal, Acadia.* Before all\
  \ of them. Over the next century and a half, something extraordinary grew up along\
  \ the Bay of Fundy. The Acadians — as these French settlers came to call themselves\
  \ — built a society that looked almost nothing like France and almost nothing like\
  \ the other European colonies that were springing up along the Atlantic seaboard.\
  \ Here is the detail I always find remarkable. The land around the Bay of Fundy\
  \ is largely salt marsh — tidal flatland that gets inundated twice a day by those\
  \ enormous Fundy tides. Most colonists would look at that landscape and see a problem.\
  \ The Acadians looked at it and saw the richest farmland in the hemisphere, if you\
  \ could figure out how to drain it. And they did. They built an engineering system\
  \ called *aboiteaux* — wooden sluices fitted with swinging one-way gates, dug into\
  \ the base of earthen dykes. Fresh water drained out through the gates at low tide.\
  \ Salt water couldn't push back in at high tide. Over two to three years, the salt\
  \ leached out of the reclaimed land, and what you were left with was some of the\
  \ most fertile soil in North America. They grew wheat, oats, barley, rye, corn,\
  \ flax. They kept cattle. Their pigs roamed freely through the forest and practically\
  \ fed themselves. An English officer visiting Acadia in the early 1700s described\
  \ the Acadian farms as the most productive he had ever seen on the continent — and\
  \ he was not saying so admiringly. He was saying so with alarm. Because by then,\
  \ the English wanted this land. The Acadians had a political stance that was, frankly,\
  \ ahead of its time and ultimately fatal to them. They called themselves *les neutres*\
  \ — the neutral ones. When war came between France and England — and war came again\
  \ and again in the 1600s and 1700s — the Acadians refused to take sides. They would\
  \ not fight for France against England. They would not swear unconditional loyalty\
  \ oaths to the British Crown. They spoke French. They were Catholic. They traded\
  \ with the Mi'kmaq, who they considered neighbors and kin. And they simply wanted\
  \ to be left alone to farm their marshlands and raise their enormous families. There\
  \ are records of Acadian women bearing children into their forties. Extended family\
  \ groups formed small hamlets — two or three houses, sometimes more — where everyone\
  \ was related, where the building of a dyke or a barn was a community celebration,\
  \ where the wealthier families shared their surplus with those who had less. It\
  \ was a society built on kinship, hard work, and a kind of stubborn pragmatic resilience.\
  \ And in 1710, when the British finally won permanent control of Acadia and renamed\
  \ it Nova Scotia — *New Scotland* — that resilience was about to be tested to destruction.\n\
  For more than four decades after 1710, the British tried to figure out what to do\
  \ with the Acadians. There were roughly fourteen thousand of them by the 1750s —\
  \ a substantial, rooted population that spoke the wrong language, practiced the\
  \ wrong religion, and refused to sign the right paperwork. The British kept asking\
  \ the Acadians to swear an unconditional oath of allegiance to the Crown — meaning\
  \ they would fight for Britain if called upon. The Acadians kept saying no. They\
  \ would swear a limited oath — yes, we'll be peaceful, we won't take up arms against\
  \ you — but unconditional? No. Not that. And then there's the Mi'kmaq situation,\
  \ which the British were watching with mounting anxiety. Because the Mi'kmaq had\
  \ not stopped resisting British expansion. They were conducting raids on British\
  \ settlements. They were allied, spiritually and practically, with the Acadians.\
  \ In British eyes, the Acadians and the Mi'kmaq together represented a permanent,\
  \ French-speaking, Catholic, potentially hostile population sitting in the middle\
  \ of their most strategically important North American territory. In 1749 — the\
  \ very year the British founded Halifax — the military governor Edward Cornwallis\
  \ issued what became known as the Scalp Proclamation. It offered bounties to anyone\
  \ who killed a Mi'kmaq person. Men, women, children. The bounty was ten guineas\
  \ per scalp. A follow-up proclamation in 1756 added prisoners to the list. This\
  \ is a fact that Halifax has had to reckon with in recent years — that the man whose\
  \ statue stood in the centre of the city for over a century, whose name was on a\
  \ school, whose image was on a plaque — that man had authorized the scalping of\
  \ the indigenous people of this land. The statue came down in 2018. The reckoning\
  \ continues. But back in the 1750s, the pressure was building toward something enormous.\
  \ In 1755, with the Seven Years' War beginning to erupt across two continents, the\
  \ British Lieutenant Governor of Nova Scotia, Charles Lawrence, decided the Acadian\
  \ question had to be resolved — permanently.\n[Ad Break]\n  Hello. I'm a lawyer\
  \ specializing in eighteenth-century colonial oath disputes.\n  Wow. That must keep\
  \ you busy.\n  You'd be surprised. My client list is actually quite long —\n  Are\
  \ they... alive?\n  Legally, that's complicated.\n  Call Neutrality & Associates.\
  \ We argue both sides. Simultaneously. It's a whole thing.\n[End Ad Break]\nJuly\
  \ 28th, 1755. Charles Lawrence and the Nova Scotia Council issue the deportation\
  \ orders. What follows is one of the most shattering forced population removals\
  \ in the history of North America. The mechanics of it were almost bureaucratic\
  \ in their cruelty. British soldiers arrived at Acadian communities — Grand Pré,\
  \ Beaubassin, Pisiquid, Annapolis Royal — and announced that the inhabitants were\
  \ to assemble at the church, or the meeting house, to hear a proclamation from the\
  \ governor. Families came. The men and older boys were separated and held. Then\
  \ they were told: your lands, your livestock, your houses — everything you have\
  \ built for a hundred and fifty years — are forfeit to the Crown. You are being\
  \ transported to the British colonies to the south. Some families were separated\
  \ on the dock. Husbands put on one ship, wives and children on another. Some never\
  \ found each other again. The ships were overcrowded. Disease spread quickly. Of\
  \ the approximately fourteen thousand Acadians living in Nova Scotia at the time,\
  \ roughly eleven thousand five hundred were deported. Of those, historians estimate\
  \ that five thousand died — of starvation, of disease, of shipwrecks — before they\
  \ reached their destinations. They were scattered up and down the Atlantic coast\
  \ — Pennsylvania, Maryland, Virginia, the Carolinas, Massachusetts. Some eventually\
  \ made it to France, only to find that France didn't particularly want them either.\
  \ Some ended up in Louisiana, where their descendants became the Cajun people, still\
  \ a living culture today. The name *Cajun* is simply a corruption of the word *Acadian*.\
  \ And the Mi'kmaq? The British continued their campaigns against them through the\
  \ 1750s and 1760s. The scalp bounties remained in effect. Disease did what muskets\
  \ couldn't always accomplish. By the time the dust settled at the end of the Seven\
  \ Years' War in 1763, the entire social and cultural landscape of what would become\
  \ Atlantic Canada had been violently remade. The Acadian villages were burned —\
  \ not just abandoned, burned — so that no one would be tempted to return. New England\
  \ settlers, called Planters, were brought in to take up the vacated farms. The dykes\
  \ the Acadians had built still stood. The fields they had reclaimed from the salt\
  \ marsh were still there, waiting. But the people were gone.\nHere is the thing\
  \ about Halifax that I want you to carry into every episode of this series. This\
  \ city was founded in 1749, just six years before the Expulsion. It was founded\
  \ specifically as a British military and administrative counter to French power\
  \ in the region. Its very existence was part of the political calculus that made\
  \ Le Grand Dérangement possible. Halifax did not cause the Expulsion. But Halifax\
  \ was built into a world where the Expulsion was being planned, and it became the\
  \ administrative capital of the colony that carried it out. That is the foundation\
  \ this city stands on — and if you're going to understand Halifax, you have to understand\
  \ that. In the next episode, we go inside the founding of Halifax itself — 1749,\
  \ Cornwallis and his 2,500 settlers sailing into that harbour, the building of a\
  \ fortified town from scratch, and why this particular spot on the map became the\
  \ military and commercial anchor of British North America. The Mi'kmaq had a name\
  \ for the harbour before the British arrived. They called it *Jipugtug* — the great\
  \ harbour. That name is still out there, underneath the English one, if you know\
  \ to look for it. I'm your host. Thank you for listening to *The Warden of the North*.\
  \ We'll see you in Episode 2.\n- ICTINC — \"The Mi'kmaq People of Nova Scotia\"\

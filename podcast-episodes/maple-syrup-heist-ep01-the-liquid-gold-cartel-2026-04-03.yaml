  \ actually.\nBut you said yes.\nNot immediately. But eventually, yes. God help me.\
  \ Yes.\nJP had his inside man. But he needed more. He needed muscle. He needed transportation.\
  \ He needed someone who could move thousands of barrels without attracting attention\
  \ in a province where everyone knows everyone and gossip travels faster than the\
  \ weather. And so, the crew grew. There was Raymond Allard — JP's cousin. Raymond\
  \ was not what you would call a natural criminal. He was a plumber by trade, a churchgoer\
  \ on Sundays, and by all accounts a deeply decent man who simply could not say no\
  \ to family. His primary qualification was that he owned a panel van. His primary\
  \ liability was that he could not keep a secret. Raymond had once spoiled a surprise\
  \ birthday party for his own mother. He told her about it three weeks in advance\
  \ because, in his words, \"she seemed sad and I wanted to cheer her up.\"\nOperational\
  \ security at its finest.\nAnd then there was \"Big Mike\" Michaud. Real name Michel.\
  \ A log trucker from the Beauce region. JP brought Big Mike in to handle transportation\
  \ and to help find buyers for the stolen syrup on the American side of the border.\n\
  Look, JP calls me up and says he needs trucks. I drive trucks. He says there's product\
  \ that needs to move across the border. I've moved lumber, I've moved gravel, I've\
  \ moved logs. Trees, syrup — what's the difference? It all comes from the same place.\n\
  The difference is that one of them is a controlled commodity worth fifteen hundred\
  \ dollars a barrel.\nYeah, well. I learned that part later.\nTruly, the Ocean's\

  \ layout. Luc knew Steve's schedule. We spoke with Luc by phone. He asked that we\
  \ not record his voice. We recorded his voice.\nJP approached me at Canadian Thanksgiving.\
  \ October, you know, not your American one. We were at my cousin's house. It was\
  \ between the turkey and the pumpkin pie. He pulled me aside and said he had a \"\
  business proposition.\" I thought he meant a landscaping job. He was always doing\
  \ landscaping jobs. I said sure, JP, what is it.\nAnd what did he say?\nHe said\
  \ — and I am quoting — \"How would you like to make more money than you have ever\
  \ seen in your life and also become a legend?\" When he told me what he actually\
  \ wanted, I choked on a dinner roll. My wife had to hit me on the back. Therese\

transcript: "In the winter of 2012, investigators in rural Quebec uncovered what would\
  \ become the largest agricultural theft in Canadian history. The stolen goods were\
  \ not gold. Not diamonds. Not priceless artwork. They were not even particularly\
  \ easy to carry.\nIt was maple syrup.\nThree thousand tons of it.\nFor context,\
  \ that is roughly eighteen million pounds of syrup. Enough to fill an Olympic swimming\
  \ pool. Twice. And still have enough left over for a truly excessive stack of pancakes.\n\
  Over the next four episodes, we are going to take you inside the most audacious,\
  \ most improbable, and quite possibly the most Canadian crime ever committed. This\
  \ is the story of a shadowy cartel, a strategic reserve that almost nobody was guarding,\
  \ and a group of men who looked at forty-five million dollars worth of maple syrup\
  \ and thought — yes. We should steal that.\nAll of it.\nAll of it.\nWith a truck.\n\
  With several trucks.\nAnd a hose.\nI'm Marc Thibodeau. With me, as always, is Danny\
  \ Brewer. And this is The Sticky Fingers.\nA true crime series. About syrup.\nBefore\
  \ we begin, a brief disclaimer. The names in this series have been changed. The\
  \ events have been... adjusted. Certain conversations have been reconstructed from\
  \ court records, interviews, and one deeply unreliable memoir written by a man who\
  \ refers to himself exclusively in the third person. But the syrup? The syrup was\
  \ very, very real.\nTo understand how someone steals three thousand tons of maple\
  \ syrup, you first have to understand the organization that controlled it. And I\
  \ use the word \"controlled\" deliberately, Danny, because there is really no other\
  \ word that fits.\n\"Monopolized\" fits.\nThe Federation of Quebec Maple Syrup Producers\
  \ was established in 1966. Its stated purpose was to protect Quebec's maple syrup\
  \ industry, stabilize prices, and ensure the long-term viability of the province's\
  \ most iconic export. Quebec, for those who may not know, produces approximately\
  \ seventy-seven percent of the world's maple syrup.\nSeventy-seven percent. Of the\
  \ world's supply. One province.\nOne province. And the federation controls all of\
  \ it. Every drop. If you are a maple syrup producer in Quebec, you sell through\
  \ the federation. You produce the amount the federation tells you to produce. You\
  \ accept the price the federation sets. And if you don't comply, you are fined.\
  \ Heavily.\nSo it's OPEC. But stickier.\nThat is not an inaccurate comparison. The\
  \ federation sets production quotas, manages exports, negotiates bulk pricing with\
  \ international buyers, and — this is the critical part — maintains what is known\
  \ as the Global Strategic Maple Syrup Reserve.\nI need you to understand that I\
  \ am not making that up. The Global Strategic Maple Syrup Reserve is a real thing.\n\
  It is a real thing. Tens of thousands of barrels of maple syrup, stored in a massive\
  \ warehouse in the town of Saint-Louis-de-Blandford, Quebec. The idea being that\
  \ if there is a bad harvest, or a sudden spike in demand, the federation can release\
  \ syrup from the reserve to stabilize prices.\nGuarded about as well as Fort Knox\
  \ is not.\nWe'll get to that. But first, I want you to hear from someone who was\
  \ there. Colette Fontaine served as president of the federation from 2009 to 2014.\
  \ We spoke with her at her home outside Montreal. She served us crepes. They were\
  \ excellent.\nPeople do not understand what maple syrup means to Quebec. They think\
  \ it is a condiment. Something you put on pancakes at a diner. This is ignorance.\
  \ Maple syrup is not a condiment. It is a strategic natural resource. It is heritage.\
  \ It is identity. The reserve exists because the world depends on us, and we cannot\
  \ afford to let the world down.\nCan you describe the reserve for us? The physical\
  \ space?\nIt was a warehouse. But to call it merely a warehouse does not capture\
  \ it. You walk in and there are barrels from floor to ceiling. Rows and rows. The\
  \ air smells sweet. The light comes in amber through the high windows. It was a\
  \ cathedral of amber. It was magnificent.\nAnd the security at this cathedral?\n\
  The security was... adequate for the time.\nCan you describe it?\nThere was a guard.\
  \ His name was Steve. Steve worked the day shift. Monday through Friday. He also\
  \ worked the night shift.\nThe same Steve?\nYes. Steve was very dedicated. He also\
  \ had a German Shepherd. The dog's name was Biscuit. Biscuit was old. Biscuit was\
  \ not a threat to anyone.\nWere there cameras?\nNo.\nAlarms?\nNo.\nWhat about the\
  \ locks?\nThere was a padlock. A good padlock. A Master Lock. The kind you buy at\
  \ Canadian Tire. It was a number four.\nTo be fair, Colette — who would steal maple\
  \ syrup?\nThat is exactly what I said at the board meeting. Those were my precise\
  \ words. \"Who would steal maple syrup?\" I regret saying it now. I regret it very\
  \ much.\nOne guard named Steve. A geriatric German Shepherd named Biscuit. No cameras.\
  \ No alarms. A padlock from Canadian Tire. Protecting forty-five million dollars\
  \ worth of liquid gold.\nYou know what has better security than that? My gym locker.\n\
  Your gym locker does not contain a significant percentage of the world's syrup supply.\n\
  No. But it does contain my headphones. And I have a combination lock.\n[Ad Break]\n\
  \  **\n  Is your syrup unprotected? Does your warehouse have fewer cameras than\

  \ for a complete brunch-based interrogation experience.\n  Not admissible as evidence\
  \ in most provinces. Check local regulations before serving to suspects.\n  Interrogation\
  \ Waffles. Because everyone talks eventually. Especially at brunch.\n[End Ad Break]\n\
  January 2013. Sergeant Diane Pelletier stood behind a podium at Sureté du Québec\
  \ headquarters in Montreal. Thirty-seven journalists. Fourteen cameras. And one\
  \ deeply surreal press conference.\nI had to stand in front of those cameras and\
  \ say, with a straight face, \"We have recovered a portion of Canada's strategic\
  \ maple syrup reserve.\" The journalists laughed. I did not. I cited the figure.\
  \ Eighteen point seven million dollars in stolen maple syrup. Three thousand tons.\
  \ The laughter stopped. Mostly.\nA reporter from the BBC asked if this was a joke.\
  \ Sergeant Pelletier cited the eighteen point seven million dollar figure a second\
  \ time. Slowly.\nHe did not ask follow-up questions.\nA CNN correspondent asked\
  \ how syrup could possibly be worth that much. Pelletier asked him how much he paid\
  \ for extra virgin olive oil. He said he didn't know. She said, \"Exactly. Now imagine\
  \ someone stole all of it.\"\nInternational journalists could not believe this was\
  \ real. To be fair, neither could most Canadians.\nThe press conference made global\

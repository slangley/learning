  Pulitzer-worthy.\nThe trial began in 2015. And it was, by all accounts, extraordinary.\
  \ Twenty-two defendants. A courtroom that smelled faintly of maple, according to\
  \ one reporter, though that may have been psychosomatic. Jean-Pierre Bouchard. Sentenced\

transcript: "Previously on The Sticky Fingers. Sergeant Diane Pelletier, armed with\
  \ a warrant, a forensic accountant, and what I can only describe as a deeply personal\
  \ grudge against maple-related fraud, mapped the entire operation. Twenty-two suspects.\
  \ Three provinces. One very nervous cousin named Raymond. The Sureté du Québec had\
  \ traced stolen syrup to Ontario, New Brunswick, and Vermont. They had surveillance\
  \ footage from an IHOP parking lot. They had phone records, bank records, and a\
  \ deeply confused FBI agent who had to explain to his supervisor why he was investigating\
  \ breakfast condiments. Operation Maple was about to move. The net was closing.\
  \ And Jean-Pierre Bouchard was still sleeping soundly at night. He would not be\
  \ sleeping soundly much longer.\nThat was the actual internal nickname, by the way.\
  \ Operation Maple Syrup Hits the Fan.\nIt was not. But it should have been.\nDecember\
  \ 2012. Four-thirty in the morning. Temperature: minus eighteen Celsius. Three hundred\
  \ officers across sixteen locations in a coordinated dawn raid. Twenty-two suspects.\
  \ Every door hit simultaneously. The Sureté du Québec does not mess around.\nThey\
  \ also do not sleep in.\nThey do not. The operation was planned down to the minute.\
  \ Officers had been briefed the night before. Some of them, I am told, had difficulty\
  \ maintaining composure during the briefing. The phrase \"strategic maple syrup\
  \ reserve\" does that to people who haven't spent three months on the case. Now,\
  \ each arrest had its own... character. Let's start with the ringleader. Jean-Pierre\
  \ Bouchard was found in his kitchen. In his underwear. Making pancakes.\nYou cannot\
  \ make this up.\nHe was using stolen syrup.\nYou absolutely cannot make this up.\n\
  Officers entered through the front door. JP was standing at the stove, spatula in\
  \ hand. There were forty barrels of stolen maple syrup in his garage. He was calm.\
  \ He offered the officers breakfast. He asked if he could finish his pancakes. Both\
  \ requests were declined.\nI told the officers, \"You're arresting the wrong people.\"\
  \ The officer said, \"Sir, you're in your underwear and there are forty barrels\
  \ of stolen syrup in your garage.\" I said, \"Allegedly stolen.\" My lawyer told\
  \ me to stop talking. I should have listened to my lawyer sooner. Like, eighteen\
  \ months sooner.\nThe officers did note, in their report, that the pancakes smelled\
  \ excellent. Grade A. Dark. Robust taste. The same syrup that was supposed to be\
  \ sitting in the strategic reserve, stabilizing global supply and defending Quebec's\
  \ market share. Instead it was on JP's breakfast plate, at five in the morning,\
  \ while three hundred officers executed a coordinated raid across eastern Canada.\n\
  Professionally relevant detail.\nMy lawyer told me not to talk about the pancakes.\
  \ But they were good pancakes. I will stand by that. The syrup was exceptional.\
  \ Say what you want about the federation, they store a quality product.\nNext. Luc\
  \ Desmarais. The inside man. Arrested at the warehouse. Or rather, in the parking\
  \ lot of the warehouse. Sleeping in his car.\nI knew it was coming. Every time I\
  \ saw a police car, my heart stopped. Every time the phone rang. Every time someone\
  \ knocked on my door. For a year, I didn't sleep. I stayed in the car because it\
  \ was more peaceful than going home to my wife's questions. When they finally arrested\
  \ me, I felt... relieved. I slept eight hours that night. First time in a year.\
  \ In a holding cell. On a metal bench. Best sleep of my life.\nHis wife later told\
  \ reporters she was also relieved. Though for different reasons. Luc, it should\
  \ be noted, was found with a half-eaten bag of gas station chips, a blanket from\
  \ home, and a resignation letter to the federation that he had written but never\
  \ sent. It was dated three months prior.\nMarriage is complicated. So is quitting\
  \ a crime ring, apparently.\nThen there was Big Mike Michaud. Pulled over on the\
  \ Trans-Canada Highway at six in the morning. Hauling a flatbed truck with fourteen\
  \ barrels of stolen syrup. Officers also found a handgun, forty thousand dollars\
  \ in cash, and a copy of The Art of War by Sun Tzu. With margin notes. About supply\
  \ chain management.\nI told them it wasn't my truck. They pointed out it had my\
  \ name on the door. In custom lettering. Look, I panicked. It was early. I hadn't\
  \ had my coffee. A man says stupid things before coffee.\nBig Mike's margin notes,\
  \ by the way, included the annotation \"Sun Tzu never had to deal with weigh stations\"\
  \ next to a passage about knowing your terrain. The officers photographed every\
  \ page.\nEvidence. And also a pretty good read, apparently.\nAnd then there was\
  \ cousin Raymond. Remember Raymond? The barber's brother-in-law who couldn't keep\
  \ a secret?\nCracked in eleven minutes.\nRaymond was already in custody. Had been\
  \ cooperating for weeks. He was, in fact, the reason several of those sixteen locations\
  \ were on the list at all. Raymond had provided names, addresses, phone numbers,\
  \ and a hand-drawn map of the entire distribution network. In colored pencil.\n\
  Thorough.\nThorough. When JP learned that Raymond had been cooperating, he reportedly\
  \ said one word. Just one. Which we cannot repeat on this podcast.\nIt rhymes with\
  \ \"duck.\"\nIt does. Raymond's colored pencil map, incidentally, was entered into\
  \ evidence. It included a legend. And a compass rose. The prosecutor called it \"\
  the most helpful piece of criminal evidence I have ever received.\"\nRaymond missed\
  \ his calling. Cartography. Not crime.\nBy noon on that December morning, all twenty-two\
  \ suspects were in custody. The Great Canadian Maple Syrup Heist was officially\
  \ over. The cleanup, however, was just beginning.\n[Ad Break]\n  Good cop, bad cop.\
  \ Classic interrogation technique. Tried and true. But you know what works better?\n\
  \  Good waffle, bad waffle.\n  From the makers of Confession Crepes: Interrogation\
  \ Waffles.\n  Waffles so good, suspects confess voluntarily.\n  Belgian-style. Double-pressed.\
  \ Golden-brown perfection. Served with Grade A maple syrup from a totally legitimate\
  \ source.\n  We checked. Mostly.\n  Tested in three precincts across Quebec. Confession\

  \ less for armed robbery. My lawyer said I should express remorse. I'm remorseful\
  \ that I got caught. Is that the same thing?\nIt is not. Luc Desmarais received\
  \ five years and a one point two million dollar fine. He cried in the courtroom.\
  \ His mother cried in the gallery. His lawyer looked like he wanted to cry but was\
  \ billing by the hour, so he maintained composure. Big Mike Michaud. Two years less\
  \ a day. His lawyer argued, with a straight face, that Big Mike genuinely believed\
  \ he was transporting \"artisanal water\" for the first three months. The judge\
  \ was unconvinced. But the sentence suggests mild entertainment.\nArtisanal water.\
  \ In barrels. That smell like maple. Weighing six hundred pounds each.\nThe defense\
  \ was creative, if nothing else. In total, twenty-two people convicted. Combined\
  \ sentences exceeding fifty years. Combined fines exceeding fifteen million dollars.\
  \ And yet. Only twenty-five percent of the stolen syrup was ever recovered.\nThe\
  \ remaining seventy-five percent is out there. On someone's pancakes. In someone's\
  \ oatmeal. Drizzled on someone's yogurt. It could be in your pantry right now. You'd\
  \ never know.\nYou genuinely would not. Stolen maple syrup is chemically identical\
  \ to legal maple syrup. There is no test. No marker. No serial number on a pancake.\
  \ Somewhere in Vermont, right now, someone is pouring stolen Canadian maple syrup\
  \ on their French toast. They have no idea. They will never have any idea. And it\
  \ tastes exactly the same.\nThe perfect crime. Except for the getting caught part.\n\
  Now, Jean-Pierre Bouchard was not a man who accepted defeat quietly. He appealed.\
  \ Specifically, he appealed the nine point four million dollar fine. His argument\
  \ was remarkable in its audacity.\nThe federation controls the price. They tell\
  \ producers how much they can sell, who they can sell to, how much they can produce.\
  \ That's not a cooperative. That's a cartel. I just... redistributed. You can't\
  \ steal from thieves. That's not stealing. That's justice.\nThe lower courts were\
  \ partially sympathetic. In 2020, the fine was reduced to one million dollars. The\
  \ federation was furious. They appealed. And this is how the Great Canadian Maple\
  \ Syrup Heist ended up before the Supreme Court of Canada. In 2022, the Supreme\
  \ Court reinstated the full nine point four million dollar fine.\nThe Supreme Court\
  \ of Canada ruled on maple syrup. This is the timeline we live in.\nThe ruling was\
  \ unanimous. Nine justices. Nine to zero. The written decision ran forty-three pages.\
  \ Forty-three pages of the highest court in Canada meticulously explaining why you\
  \ cannot steal maple syrup, even if you think the people storing it are charging\
  \ too much. JP was philosophical about it.\nThe Supreme Court of Canada knows my\
  \ name. How many people can say that? I'm in the law books now. Forever. My mother\
  \ would be proud. If she wasn't so angry.\nJP still maintains he was right. He has\
  \ given interviews from prison. He has given interviews after prison. His position\
  \ has not changed in over a decade. He is consistent. You have to give him that.\n\
  I was right then. I'm right now. The federation is a cartel. The Supreme Court can\
  \ say otherwise. Nine justices, nine to zero. I respect the institution. But I respectfully\
  \ disagree. With all nine of them.\nRespectfully.\nAs for the federation. They learned\
  \ their lesson. Sort of. Their response to the largest agricultural theft in Canadian\
  \ history was not to question the system that created a target worth stealing. No.\
  \ They added more syrup to the reserve. Expanded capacity. Installed cameras, alarm\
  \ systems, motion sensors, and electronic monitoring on every barrel.\nThey hired\
  \ more guards. Steve got a promotion.\nSteve got a promotion?\nSteve is now head\
  \ of security. He has a badge and everything. A real one. Not laminated.\nThe strategic\
  \ reserve today holds over one hundred million pounds of maple syrup. Worth approximately\
  \ half a billion dollars. Stored in a facility that now has, I am told, actual security\
  \ infrastructure. The padlock has been replaced.\nProgress.\nThe federation's president,\
  \ Colette Fontaine, addressed the changes at a press conference in 2023.\nWe have\
  \ invested significantly in security. The reserve is monitored twenty-four hours\
  \ a day. We have learned from this experience. And no, I will not be taking questions\
  \ about Steve.\nHenri Delorme, the competition entrant whose prize-winning syrup\
  \ was stolen and mixed into the general haul, never did get his syrup back. He entered\
  \ the competition again in 2014. He won second place. He has not spoken publicly\
  \ about the heist. But his entry form that year listed his syrup's name as \"Revenge.\"\
  \ He did not elaborate.\nHenri understood the assignment.\nThe Great Canadian Maple\
  \ Syrup Heist remains one of the most unusual crimes in modern history. Eighteen\
  \ point seven million dollars. Three thousand tons. Twenty-two convictions. One\
  \ Supreme Court ruling. And a strategic reserve that now has better locks. It exposed\
  \ the strange reality of Canada's maple syrup cartel — a legal monopoly controlling\
  \ a breakfast condiment with the intensity of a petroleum state. The OPEC of pancakes,\
  \ as we called it in episode one. Still operational. Still powerful. Still storing\

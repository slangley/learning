transcript: "Stand on the boardwalk at the Halifax waterfront on a summer evening,\
  \ and pay attention to what you're seeing. To your left: the massive steel cranes\
  \ of the container port, lit up against the darkening sky, loading and unloading\
  \ the global supply chain. To your right: the restored stone warehouses of the Historic\
  \ Properties, where the privateers once stored their plunder, now full of restaurants\
  \ and craft beer. Directly in front of you: the harbour that has been the reason\
  \ for this city's existence since 1749 — deep, sheltered, enormous, still working.\
  \ Behind you, up the hill, is the Citadel — the star-shaped fortress that has watched\
  \ over everything. And scattered through the streets around it: the offices of tech\
  \ startups and ocean science firms and four universities and a film industry that\
  \ has discovered the architectural variety of a city built over 275 years makes\
  \ an excellent backdrop for American period dramas. Halifax in 2025 is a city in\
  \ the middle of something. It's growing faster than it has in decades. Its population\
  \ has crossed half a million. Its tech sector is being called one of the fastest-emerging\
  \ in North America. And it is reckoning, still, with the history we've spent five\
  \ episodes tracing. This is Episode 6 — the final episode of *The Warden of the\
  \ North*. We're coming home to the present.\nLet's start with the data, because\
  \ the data is surprising. In 2024, Halifax's GDP grew by 2.6 percent — the second\
  \ highest growth rate among its benchmark peer cities in Canada. The population\
  \ of the Halifax Regional Municipality — the amalgamated city that has included\
  \ Dartmouth, Bedford, Sackville, and the surrounding counties since 1996 — passed\
  \ half a million people for the first time. 503,000 people, growing by roughly 11,600\
  \ per year. The labour force grew by 5.3 percent in 2024, the highest rate in the\
  \ province's modern history. Nearly 14,000 new jobs were added in a single year.\
  \ For a city that spent most of the 20th century watching its young people leave\
  \ for Toronto and Calgary and Vancouver — a pattern so ingrained it became part\
  \ of the Maritime personality, this idea of the place you loved and left — these\
  \ numbers represent a genuine reversal. What happened? Several things at once. The\
  \ pandemic changed the calculus for a lot of Canadians. If you could work remotely,\
  \ and you were paying Toronto prices for a condo, and you had always loved Halifax\
  \ or had gone to university there, or had a cousin who kept telling you it was actually\
  \ great — the pandemic gave people permission to move. Halifax's cost of living,\
  \ while higher than it was, remains substantially lower than Canada's largest cities.\
  \ You can own a house here. That is not a small thing in 2025. The tech sector accelerated\
  \ the trend. Halifax ranked fifth among all of North America's emerging tech talent\
  \ markets in a 2024 report — one of only three Canadian cities to make that list.\
  \ Ocean technology, cybersecurity, defence contracting tied to the naval base, digital\
  \ health, clean energy — a cluster of industries is building in Halifax that has\
  \ nothing to do with the harbour or the military, even if those institutions remain\
  \ foundational. The universities keep filling. International students have been\
  \ arriving in large numbers — though federal changes to the international student\
  \ program in 2024 introduced new uncertainty. Immigration has been the single largest\
  \ driver of population growth, with more than 12,000 net new international migrants\
  \ arriving in 2024 alone. Halifax is becoming, in ways that would genuinely surprise\
  \ its founders, a diverse city. The Mi'kmaq word *Jipugtug* — the great harbour\
  \ — is showing up in public signage, in school curricula, in the naming of new community\
  \ spaces. The land acknowledgment at the start of public events has moved from a\
  \ formality that many people ignored to something that at least some people are\
  \ beginning to mean.\n[Ad Break]\n  Are you a remote worker in a 400-square-foot\
  \ Toronto condo paying $2,800 a month to look at a wall?\n  Have you considered\
  \ Halifax? It has a harbour! It has a Citadel! It has craft beer in privateer warehouses!\n\
  \  You can get a house with a backyard! You will know your neighbours! There is\
  \ excellent lobster!\n  The winters are real. We won't lie about the winters.\n\
  \  Halifax. Come for the affordability, stay for the feeling that this is actually\
  \ a place where people live.\n[End Ad Break]\nThere is a particular kind of person\
  \ that Halifax makes. Not universally, and not everyone who lives there — plenty\
  \ of people pass through a university degree and leave without ever quite becoming\
  \ Haligonians. But the ones who stay, or who left and came back, or who came from\
  \ somewhere else and got absorbed — they tend to have something in common. Haligonians\
  \ are, as a general rule, proud of their city without being obnoxious about it.\
  \ They will tell you Halifax is underrated. They will also tell you the potholes\
  \ are a serious ongoing civic embarrassment. They hold both of these opinions simultaneously\
  \ and without apparent contradiction. They care about the harbour. Not just as a\
  \ backdrop or a real estate feature, but as a living thing — the container port,\
  \ the naval vessels, the ferry that crosses to Dartmouth, the kayakers in the morning.\
  \ There is a specific pleasure that people who live in Halifax describe, of being\
  \ in a mid-sized city that is also genuinely, functionally a working port. It is\
  \ not a decorative harbour. It is doing something. The food scene is real and it\
  \ is centred on the ocean. Lobster, obviously — Nova Scotia lobster is among the\
  \ best in the world, and it is priced, at the source, in a way that lets regular\
  \ people eat it. Digby scallops. Swordfish. Dulse. The Lunenburg-style sauerkraut\
  \ that descended from those 18th-century German Protestant settlers and somehow\
  \ survived in local food culture. The farmers markets — the Halifax Seaport Farmers'\
  \ Market, running continuously in some form since 1750, claiming to be the longest-running\
  \ farmers market in North America. The music scene. Joel Plaskett, based in Dartmouth,\
  \ is perhaps the most beloved figure in Halifax music — a musician who has spent\
  \ thirty years writing songs specifically about this place, these streets, these\
  \ feelings, and found that the specificity made his work universal. The Halifax\
  \ Pop Explosion festival continues. The live music venues along Barrington Street\
  \ and Gottingen Street draw audiences who are serious about what they're hearing.\
  \ And the arts. The Nova Scotia College of Art and Design has been punching above\
  \ its weight for decades. Oscar-winning documentary filmmaker Ben Proudfoot is a\
  \ Haligonian. The East Coast film and television industry, while smaller than Central\
  \ Canada's, has built something durable. Writers like David Adams Richards and Thomas\
  \ Raddall have rooted their work in the texture of Maritime life and found readers\
  \ across the country. There is also, still, a chip on the shoulder. Halifax has\
  \ been overlooked by the national imagination for most of its existence — treated\
  \ as a regional footnote to the central Canadian story when in fact it is, as this\
  \ whole series has argued, one of the most historically consequential cities in\
  \ North America. That overlooking leaves a mark. Haligonians sometimes seem to be\
  \ waiting to be recognized for what they already know about themselves.\nOne of\
  \ the defining tensions of modern Nova Scotia is the gap between Halifax and everywhere\
  \ else. The province outside Halifax is beautiful. The Annapolis Valley — where\
  \ Acadian farmers built their dyke system four hundred years ago — still has some\
  \ of the best agricultural land in Atlantic Canada. The South Shore has fishing\
  \ communities and artists' colonies and a German heritage that shows up in the architecture\
  \ of Lunenburg, a UNESCO World Heritage site since 1995. Cape Breton is one of the\
  \ most dramatically beautiful places on the continent — the Cabot Trail, the Bras\
  \ d'Or Lakes, the music that flows from a Scottish and Mi'kmaq and Acadian and Irish\
  \ heritage all living on the same island. But Cape Breton lost its steel mills in\
  \ 2001. The cod moratorium of 1992 never fully ended. Young people have been leaving\
  \ rural Nova Scotia for generations, and while the flow has slowed somewhat, it\
  \ hasn't reversed. Towns that once had 5,000 people have 2,000. Schools close. Hospitals\
  \ consolidate into regional centres that require a 90-minute drive for an emergency.\
  \ The health system in rural Nova Scotia is under genuine, serious pressure. The\
  \ tension shows up in provincial politics. Halifax tends to vote one way; rural\
  \ Nova Scotia often votes another. The issues that animate city council debates\
  \ in Halifax — transit, housing density, bike lanes, land acknowledgments — can\
  \ feel remote from the concerns of a fisherman in Yarmouth or a nurse in Antigonish.\
  \ The province that Joseph Howe described as a coherent, prosperous place that deserved\
  \ to stand on its own is, in 2025, a province of genuine contrasts. The Indigenous\
  \ story continues to develop. Mi'kmaq treaty rights, after decades of legal battles,\
  \ are being implemented in new ways. The landmark Sipekne'katik First Nation lobster\
  \ fishery dispute of 2020 — when Mi'kmaq fishers exercised their treaty right to\
  \ fish outside the federal commercial season and faced harassment from non-Indigenous\
  \ fishers — demonstrated that treaty implementation is not an abstract historical\
  \ question. It is live, it is contested, and it is unfinished. The province's government\
  \ has been navigating these tensions with varying degrees of success. Housing affordability\
  \ — driven by Halifax's growth and national interest rate dynamics — became a serious\
  \ political issue through the early 2020s. Nova Scotia's health care system, like\
  \ most in Canada, is strained by workforce shortages and post-pandemic pressure.\
  \ The province is trying to attract immigrants while also building the infrastructure\
  \ to integrate them. It is doing some things well and struggling with others.\n\
  [Ad Break]\n  So after six episodes, what have we learned about Halifax?\n  That\
  \ it's been the most important city most people have never thought about.\n  Military\
  \ gateway. Privateer capital. Explosion survivor. Post-war university town. Now\
  \ a tech hub.\n  And still sending Boston a Christmas tree every year because Massachusetts\
  \ helped dig them out of the rubble in 1917.\n  That's actually kind of beautiful.\n\
  \  Halifax is kind of beautiful.\n[End Ad Break]\nI want to end this series where\
  \ it began — at the harbour. The deep, sheltered harbour that the Mi'kmaq called\
  \ *Jipugtug* is still, at its core, the reason Halifax exists and the reason it\
  \ has mattered. Every chapter of this history runs through it. The French ships\
  \ coming into Annapolis Basin in 1604. The British transports arriving in 1749.\
  \ The privateer schooners setting out for American waters. The troop ships sailing\
  \ for Europe in 1914. The merchant convoys assembling in Bedford Basin in 1939.\
  \ The container ships arriving today. There's an argument to be made — and I'll\
  \ make it — that Halifax is the most consequential city in Canadian history that\
  \ Canadians know the least about. The country's first newspaper. The country's first\
  \ elected assembly. The staging ground for the war that made Canada British. The\
  \ city that survived the largest human-made explosion in history and rebuilt. The\
  \ arsenal that kept Britain alive in the Second World War. The city where some of\
  \ Canada's oldest Black communities have lived, and struggled, and been wronged,\
  \ and persisted. None of that is a small thing. All of it gets undersold. Halifax\
  \ today is a city in the act of becoming. Becoming more diverse, more prosperous,\
  \ more honest about its history, more alive to what has been there all along. It\
  \ still has work to do — on housing, on health, on the rural-urban gap, on the ongoing\
  \ obligations to the Mi'kmaq that a hundred and fifty years of Canadian history\
  \ tried to paper over. But it is also a city where you can walk from a waterfront\
  \ that has been working for ten thousand years to a concert hall that is full on\
  \ a Tuesday night, past a church that was founded by Black Loyalists in the 1780s,\
  \ up a hill to a fortress that has been watching over everything since before Canada\
  \ existed. That is a remarkable thing to be.\nWe've covered a lot of ground in six\
  \ episodes. Roughly ten thousand years, give or take. The Mi'kmaq and the Acadians\
  \ and the British and the Loyalists. The privateers and the soldiers and the train\
  \ dispatcher who stayed at his post. The community that was bulldozed by garbage\
  \ trucks and the people who spent forty years demanding an apology and the city\
  \ that eventually, imperfectly, gave one. If this series has done its job, Halifax\
  \ feels different to you now. Not just a city on the Atlantic coast of Canada, but\
  \ a place with weight and depth and a story that is still going. A warden stands\
  \ watch. Halifax has been doing that for 275 years. I don't think it's done. Thank\
  \ you for listening to *The Warden of the North: A History of Halifax*. This has\
  \ been six episodes. If you want to keep going — and there is so much more to say\
  \ — start at the waterfront. Walk up the hill. Listen. The harbour will tell you\

transcript: "Let me paint you a picture of Halifax in the summer of 1812. The streets\
  \ are packed. The waterfront is a riot of commerce — barrels being rolled, ropes\
  \ being coiled, merchants shouting prices. The taverns are doing business at ten\
  \ in the morning. The harbour is full of ships. The air smells of salt, tar, and\
  \ money. Britain and the United States have just declared war on each other. In\
  \ most North American cities, that would be a catastrophe. In Halifax, it was essentially\
  \ a business opportunity. This is the story of how Halifax became, for a remarkable\
  \ forty-year stretch between 1775 and 1815, one of the wealthiest and most strategically\
  \ vital cities in the British Empire — not despite the constant wars swirling around\
  \ it, but because of them. And we're going to tell it through the story of privateers\
  \ — men with government licenses to steal, who made fortunes on the high seas while\
  \ Halifax kept score. Welcome back to *The Warden of the North*. This is Episode\
  \ 3.\nWe left Halifax at the end of Episode 2 as a fortified colonial capital that\
  \ had just helped Britain win the Seven Years' War. In 1775, everything changed\
  \ again. The American Revolution put Halifax in an impossible and ultimately very\
  \ profitable position. Nova Scotia had more in common, culturally and economically,\
  \ with New England than with Britain. Many Nova Scotians had family in Massachusetts.\
  \ Many had been born there. There were serious voices in the province arguing that\
  \ Nova Scotia should join the revolution. They didn't. Partly because of the British\
  \ military garrison in Halifax, which made revolt difficult. Partly because Nova\
  \ Scotia's economy was deeply tied to British naval contracts. And partly because\
  \ there was genuine ambivalence — a sense that whatever the grievances against the\
  \ Crown, throwing in with thirteen colonies that might or might not succeed was\
  \ a dangerous gamble. So Nova Scotia stayed loyal. And Halifax spent the revolutionary\
  \ war as the primary British naval base for operations against the American colonies\
  \ — the place where ships were repaired, troops were supplied, and intelligence\
  \ was gathered. It was uncomfortable, lucrative, and it positioned Halifax perfectly\
  \ for what came next. When the revolution ended in 1783 and Britain lost, the Loyalists\
  \ came north. We mentioned this at the end of Episode 2 — but the scale of it bears\
  \ emphasis. Roughly 35,000 people. To put that in perspective, the entire population\
  \ of Nova Scotia before the Loyalist influx was perhaps 20,000. The province absorbed\
  \ nearly double its own population in the space of a few years. These Loyalists\
  \ were not uniformly welcomed. The existing population — what remained of the pre-Loyalist\
  \ settlers, the newly arrived German Protestants of Lunenburg, the small but established\
  \ free Black communities — found themselves suddenly outnumbered and in many cases\
  \ pushed aside. Land that had been promised to one group was given to another. The\
  \ Loyalists who arrived with resources and connections got the best of everything.\
  \ The Black Loyalists — roughly 3,500 men and women who had been promised freedom\
  \ and land in exchange for fighting for Britain — got the worst of the bargain.\
  \ They were given marginal land, few supplies, and almost none of the legal protections\
  \ they had been promised. Many eventually gave up and sailed for Sierra Leone. Others\
  \ stayed and built what became the oldest Black communities in Canada. Halifax absorbed\
  \ all of this turmoil and kept growing. The city's population swelled. New institutions\
  \ were founded. Dalhousie University would be established in 1818 by the Earl of\
  \ Dalhousie, its endowment funded in part by fines collected from American merchants\
  \ during the War of 1812 — an origin story that tells you everything about the period.\n\
  [Ad Break]\n  Have you always dreamed of arriving somewhere as a refugee and immediately\
  \ being treated like a second-class citizen?\n  Colonial Land Promises Inc. — we\
  \ guarantee you land! The land may be swamp. The land may be rocks.\n  The deed\
  \ may not exist! Details are for the landed gentry!\n  Colonial Land Promises Inc.\
  \ — not responsible for broken oaths, frozen winters, or the 18th century in general.\n\
  [End Ad Break]\nCast your eyes across the Atlantic to Europe in the 1790s. France\
  \ is in revolution, then in the hands of a short, brilliant, terrifyingly ambitious\
  \ general named Napoleon Bonaparte. From 1793 onwards, Britain and France are in\
  \ an almost continuous state of war. The Royal Navy is stretched to its breaking\
  \ point trying to blockade European ports, protect British trade, and fight naval\
  \ engagements from the Caribbean to the Mediterranean. Halifax is at the centre\
  \ of all of it. The British North Atlantic squadron is based here. The dockyards\
  \ are running at full capacity. Every ship that crosses the Atlantic — whether it's\
  \ carrying troops, supplies, or intelligence — touches Halifax. The city is making\
  \ money on a scale it had never imagined. And then came the private sector version\
  \ of naval warfare. Privateering. Here is how privateering worked. A government\
  \ would issue a document called a Letter of Marque — essentially a license — authorizing\
  \ a privately owned ship to attack and capture enemy merchant vessels. You kept\
  \ the cargo. You kept the ship if you could sell it. You split the proceeds with\
  \ your crew and your investors. It was, in legal terms, piracy that the government\
  \ approved of. In commercial terms, it was venture capitalism with cannons. Nova\
  \ Scotia had been issuing Letters of Marque since the Seven Years' War. But the\
  \ Napoleonic era turned it into an industry. From Halifax and Liverpool — a small\
  \ port town on the south shore of Nova Scotia, not to be confused with its English\
  \ namesake — privateers sailed out to intercept French and later American merchant\
  \ ships. The prizes they brought back into port made fortunes. The Historic Properties\
  \ building on the Halifax waterfront — still standing today, still beautifully preserved\
  \ — was built in part with privateer money. The stone warehouses along the harbour\
  \ were where captured cargoes were stored and auctioned. The Liverpool Packet was\
  \ the most famous of them all. A small, fast topsail schooner — nimble in ways larger\
  \ ships couldn't be — she slipped in and out of American coastal waters with extraordinary\
  \ success. In two years of operations during the War of 1812, under four different\
  \ captains, the Liverpool Packet captured more than fifty American merchant vessels.\
  \ Fifty. The value of those prizes was enormous. The crew members who sailed on\
  \ her came home wealthy.\nThe War of 1812 is one of the stranger conflicts in North\
  \ American history. Britain and the United States fighting each other while Britain\
  \ is also fighting Napoleon in Europe. The Americans invading Canada. Canadians\
  \ burning the American President's house. Nobody winning decisively. The war ending\
  \ in 1815 essentially where it started, with both sides declaring victory. But for\
  \ Halifax, it was a remarkable three-year windfall. Nova Scotia's lieutenant governor\
  \ at the time was Sir John Coape Sherbrooke, and he was shrewd enough to see the\
  \ opportunity. He successfully lobbied London to allow Halifax to continue trading\
  \ with American ports — even while Britain and America were technically at war.\
  \ The logic was practical: Nova Scotia needed American goods, and American merchants\
  \ needed somewhere to sell. Money doesn't care about politics. By the third year\
  \ of the war, Halifax's port revenues had tripled. The privateers were bringing\
  \ in captured American ships at a rate that overwhelmed the prize courts. Merchant\
  \ families were becoming dynasties. The Enos Collins family is the classic example\
  \ — Collins had made his fortune partly through privateer investment, and by the\
  \ end of his life he was reportedly the wealthiest person in Canada. His fortune\
  \ was estimated at six million dollars at a time when that was an almost incomprehensible\
  \ sum. The prosperity was real, but it was also brittle. When Napoleon was finally\
  \ defeated at Waterloo in 1815 and the Wars of 1812 ended, the military spending\
  \ and the wartime trade dried up almost simultaneously. Halifax went from boom to\
  \ something considerably more modest. The city that had been printing money for\
  \ forty years suddenly had to figure out what it was in peacetime.\n[Ad Break]\n\
  \  Are you a privateer with fifty captured American ships and absolutely nowhere\
  \ to store the cargo?\n  Call Halifax Prize Court Storage! We'll auction your plunder,\
  \ process your Letter of Marque, and validate your parking!\n  We accept payment\
  \ in Spanish doubloons, American cotton, and Canadian apologies!\n  Halifax Prize\
  \ Court Storage. Because piracy is better with paperwork.\n[End Ad Break]\nWhat\
  \ did forty years of wartime prosperity leave behind? Quite a bit, actually. Halifax\
  \ by 1815 had a waterfront lined with stone warehouses built to last centuries.\
  \ It had a class of merchants wealthy enough to fund cultural institutions. It had\
  \ a military establishment — the Citadel, the naval yard, the barracks on Citadel\
  \ Hill — that had been continuously improved and expanded. It had a culture that\
  \ was simultaneously rough and aspirational. The roughness is worth noting. The\
  \ waterfront district of Halifax in the early 19th century was genuinely dangerous\
  \ — a warren of grog shops and boarding houses catering to sailors from every nation.\
  \ The British naval establishment tried repeatedly to impose order on the waterfront\
  \ and largely failed. The sailors didn't want order. They wanted to drink and fight\
  \ and spend their prize money before they had to go back to sea. But there was aspiration\
  \ too. The merchant class was building churches, schools, newspapers. The *Novascotian*\
  \ newspaper, founded in 1824, would become the platform of Joseph Howe — the journalist\
  \ and politician who would lead the fight for responsible government and later the\
  \ fight against Confederation. We'll hear a great deal more about Howe in a later\
  \ episode. Halifax was also developing something that would define it for the next\
  \ two centuries: a deeply ambivalent relationship with its own importance. It was\
  \ clearly vital — strategically, commercially, geographically. But it was also remote,\
  \ underpopulated relative to its importance, and dependent on the decisions of people\
  \ in London and later Ottawa who often had no particular interest in what was good\
  \ for Nova Scotia. The city that had been built as an instrument of empire was starting\
  \ to chafe against being just an instrument. It wanted to be a place. The next episode\
  \ will take us to the most traumatic moment in Halifax's history — a morning in\
  \ December 1917 when the city learned, in the most violent way imaginable, just\
  \ how much the rest of the world could affect a harbour city that thought it had\
  \ seen everything.\nWe are building toward the Halifax Explosion. But before we\
  \ get there, we need to stop in on the late 19th century — the railways, Confederation,\
  \ the long economic slide — because the condition Halifax was in by December 1917\
  \ is part of the story. In Episode 4, we cover it all — from Confederation through\
  \ the most powerful human-made explosion on record up to that point. No sensationalism.\
  \ Just the facts, which turn out to be extraordinary enough on their own. This is\
  \ *The Warden of the North*. Thank you for listening.\n- Canadian Encyclopedia —\

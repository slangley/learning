transcript: "Previously on The Sticky Fingers. A crew of four men, led by a charming\
  \ ringleader named Jean-Pierre Bouchard, spent the better part of a year siphoning\
  \ maple syrup from the Federation of Quebec Maple Syrup Producers' strategic reserve.\
  \ Three thousand tons of it. Eighteen point seven million dollars. They replaced\
  \ it with water. They stole whole barrels. They drove trucks in and out of a warehouse\
  \ guarded by one man named Steve, a padlock, and absolutely no cameras. Nobody noticed.\
  \ Nobody checked. Nobody asked why the reserve smelled faintly of larceny.\nBut\
  \ in July 2012, a federation inspector named Marcel Gagnon climbed a stack of barrels.\
  \ And everything changed. July 2012. Quebec was coming off a record maple season.\
  \ Prices were strong, demand was high, and the federation's strategic reserve was\
  \ supposedly sitting at full capacity across six warehouses in the town of Saint-Louis-de-Blandford.\
  \ Population: roughly twelve hundred. Crime rate: historically, zero. Every summer,\
  \ the federation conducts a routine inventory audit. Someone has to go into each\
  \ warehouse, count the barrels, verify the lot numbers, check the seals. It is,\
  \ by all accounts, the least exciting job in Canadian agriculture. And for eleven\
  \ consecutive years, that job belonged to Marcel Gagnon. I visited Marcel at his\
  \ home in Drummondville. He offered me tea before I had taken off my coat. He was\
  \ wearing a cardigan. He has a collection of model trains in his basement. I mention\
  \ this because it tells you everything you need to know about the kind of man Marcel\
  \ Gagnon is. Thorough. Patient. A man who counts things for a living and finds genuine\
  \ satisfaction in it.\nI had been inspecting the reserve for eleven years. Eleven\
  \ years of counting barrels. It is not glamorous work. But someone has to do it.\n\
  Marcel told me he had never found a single discrepancy in eleven years. Not one.\
  \ Every barrel accounted for, every lot number matching the manifest. He said this\
  \ with pride. He said it the way a man talks about a perfect attendance record at\
  \ church. July twentieth. Warehouse number four. Marcel arrived at eight in the\
  \ morning with his clipboard, his reading glasses, and a thermos of coffee. The\
  \ warehouse held approximately fourteen thousand barrels, stacked three high on\
  \ wooden pallets, stretching in rows from one end of the building to the other.\
  \ The air smelled like maple. It always smelled like maple. He began at row one\
  \ and worked his way methodically toward the back.\nI needed to verify a lot number\
  \ near the top of a stack in the northeast corner. So I climbed up. I have done\
  \ this hundreds of times. You put your foot on the lower barrel, you grab the rim\
  \ of the upper one, and you pull yourself up. Routine.\nExcept this time, when Marcel\
  \ put his hand on the barrel to steady himself, something happened.\nIt shifted.\n\
  A full barrel does not shift. A full barrel weighs six hundred pounds. You could\
  \ lean your entire body weight against it and it would not move. This one slid like\
  \ it was on ice.\nThe barrel tipped off the stack. Marcel lost his grip and fell\
  \ backward, landing on the concrete floor. The barrel came down a fraction of a\
  \ second later.\nIf I had been standing six inches to the left, I would not be here\
  \ talking to you. Six hundred pounds of steel falling from eight feet. But it was\
  \ not six hundred pounds. That was the thing. I watched a barrel that should have\
  \ been full of maple syrup bounce off the concrete floor like a basketball.\nMarcel\
  \ lay on the floor of warehouse four, staring at a forty-five-gallon steel drum\
  \ that had just bounced. He got to his feet. He walked over to the barrel. He knocked\
  \ on the side.\nIt rang like a church bell. Hollow. Completely hollow.\nHe opened\
  \ it. Empty. He opened the next one. Water. The one after that. Water. The one after\
  \ that. Empty.\nI opened forty barrels that afternoon. Thirty-seven were either\
  \ empty or full of water.\nThat's a ninety-two point five percent fraud rate, for\
  \ those keeping score at home.\nMarcel sat down on the warehouse floor. He stared\
  \ at the ceiling. He set his clipboard on his lap.\nI sat there for a very long\
  \ time. And I thought: either this is the worst clerical error in Canadian history,\
  \ or something very, very bad has happened.\nMarcel did what Marcel does. He filed\
  \ a report. He went back to his office, sat down at his computer, and typed a memo\
  \ to federation headquarters. Subject line: \"Critical Inventory Discrepancy — Immediate\
  \ Attention Required.\" He used red font. He triple-underlined the word \"critical.\"\
  \ He flagged it as urgent priority. He attached photographs. He sent it to four\
  \ people. He cc'd two more, just to be safe.\nI went home that night and I could\
  \ not sleep. I kept thinking about the sound. That hollow ringing. I must have opened\
  \ and closed my refrigerator six times, just listening to things that sounded solid.\
  \ My wife asked me if I was feeling all right.\nNobody read the report for two weeks.\n\
  In fairness, it was filed behind a stack of parking validations and a formal complaint\
  \ about the vending machine in Building C.\nThe vending machine.\nBuilding C's vending\
  \ machine had been stealing people's loonies for months. Truly, a crime wave.\n\
  When federation president Colette Fontaine finally learned the scope of what had\
  \ happened, she was at an agriculture conference in Montreal. I spoke with her by\
  \ phone.\nThe lieutenant called me on my cell phone during a panel on sustainable\
  \ tapping practices. He said, \"Colette, we have a problem.\" I assumed it was the\
  \ vending machine again.\nIt was not the vending machine.\nHe said, \"Most of it.\
  \ Most of the reserve.\" And I said, \"Most of what?\" And he said, \"Most of the\
  \ syrup. It's gone.\" I had to sit down.\nEighteen point seven million dollars.\
  \ Gone. Replaced with water.\nWhat did you do?\nI believe my exact words were...\
  \ unprintable. And then I called the police. And then I called my therapist.\nThe\
  \ federation's insurance did not cover \"replacement of syrup with water.\" They\
  \ checked.\nColette told me she spent the next seventy-two hours in emergency meetings.\
  \ The board convened. Lawyers were called. Accountants were woken up at home. Someone\
  \ suggested checking whether the water in the barrels was at least clean. It was\
  \ not.\nInsult to injury.\nThe police were formally contacted on August fifth, 2012.\
  \ The largest heist in Canadian history was now a police matter. And somewhere in\
  \ a barbershop in Trois-Rivieres, cousin Raymond was still talking.\n[Ad Break]\n\
  \  Are you tired of boring, crime-free breakfast condiments?\n  Introducing True\
  \ Crime Syrup. The only maple syrup that comes with a story. Each bottle inspired\
  \ by a real criminal case.\n  This month's blend: The Sticky Bandit. Bold, dark\
  \ amber with notes of intrigue and poor decision-making.\n  Pour it on your pancakes\
  \ and solve the mystery. Every bottle contains a clue card.\n  Last month's flavour,\
  \ The Inside Man, sold out in three days. Customers described it as \"surprisingly\
  \ complex\" and \"morally ambiguous.\"\n  True Crime Syrup. Delicious. Suspicious.\
  \ Objection-free.\n  Available at fine grocery stores and most courthouses.\n  True\
  \ Crime Syrup.\n  You have the right to remain delicious.\n[End Ad Break]\nThe Surete\
  \ du Quebec assembled a task force. They called it Operation Maple. Because of course\
  \ they did.\nBold name. Very covert.\nThe task force was led by Sergeant Diane Pelletier,\
  \ a twelve-year veteran of the provincial police who had just transferred from the\
  \ homicide division in Quebec City. She had a reputation for being meticulous, relentless,\
  \ and humourless in exactly the right proportion. I should note that she did not\
  \ request this transfer.\nWhen my captain told me I was being assigned to a syrup\
  \ theft, I thought it was hazing. I had just closed a double homicide in Sherbrooke.\
  \ I had commendations. And now I was being told to investigate missing pancake ingredients.\n\
  Her colleagues were supportive, in their way.\nThey left Aunt Jemima bottles on\
  \ my desk. One of them wrapped my service weapon in a pancake. A real pancake. I\
  \ had to file a report about it.\nBut the case was no joke. Eighteen point seven\
  \ million dollars. Potentially the largest agricultural theft in North American\
  \ history. And Pelletier quickly discovered that investigating it presented unique\
  \ challenges.\nSyrup doesn't have serial numbers. You can't dust it for fingerprints.\
  \ Once it's mixed with other syrup, it's gone. It dissolves into the supply chain.\
  \ We were looking for a liquid needle in a liquid haystack.\nShe assembled a team\
  \ of eight investigators, two translators — because the paperwork was in both French\
  \ and English and the legal terminology did not always translate cleanly — and a\
  \ forensic accountant from Montreal.\nOn his first day, he told me this was \"the\
  \ stickiest case he'd ever worked.\" I reassigned him.\nHarsh but fair.\nThe team\
  \ began following the money. Shipping records. Trucking manifests. Export declarations.\
  \ Somewhere, three thousand tons of maple syrup had been sold, and the proceeds\
  \ had gone into someone's pocket. Syrup that heavy does not move quietly. It requires\
  \ trucks, warehouses, buyers, distributors. It leaves a paper trail. You just have\
  \ to know where to look. And then they caught their break.\nCousin Raymond.\nOf\
  \ course.\nRaymond Bouchard, the crew's logistics coordinator and the man who, as\
  \ we established in episode two, could not stop telling people about the heist.\
  \ He had been bragging at a bar in Trois-Rivieres. Not quietly. Not in a corner.\
  \ At the bar. To anyone who would listen. He told the bartender — a woman named\
  \ Suzanne — over his fourth beer of the evening, that he was, and I am quoting directly\
  \ here, \"a major player in the syrup underworld.\"\nThe bartender mentioned it\
  \ to her brother-in-law at a family barbecue. Her brother-in-law happened to be\
  \ a retired RCMP officer.\nThat is the most Canadian chain of custody I have ever\
  \ heard.\nThe retired officer called a friend at the Surete. The friend called Pelletier.\
  \ Pelletier brought Raymond in for questioning on a Tuesday afternoon in October.\n\
  He lasted eleven minutes.\nEleven minutes.\nEleven minutes. He gave us everything.\
  \ Names, dates, locations, buyers, prices, routes. He drew us a map on a napkin.\
  \ He asked if he could get a reduced sentence for cooperating. We had not yet charged\
  \ him with anything.\nWith Raymond's information, the investigation expanded rapidly.\
  \ The syrup had moved through a network that stretched across three provinces and\
  \ into the United States. Pelletier traced shipments to Ontario, to New Brunswick,\
  \ and across the border to Vermont. In New Brunswick, they found something remarkable.\
  \ An elderly businessman named Etienne Lafleur, operating out of a converted barn\
  \ on a quiet rural property, running what can only be described as a syrup laundering\
  \ operation.\nSyrup laundering.\nSyrup laundering. Lafleur would purchase stolen\
  \ syrup at a fraction of the market rate, re-barrel it, forge new federation seals,\
  \ and sell it as legitimate product to distributors in the Maritimes and New England.\
  \ He had been doing this for years. He had a filing system. He kept receipts. He\
  \ had a ledger, handwritten, in a leather-bound notebook. He was seventy-three years\
  \ old, a grandfather of six, and showed no signs of remorse. When officers arrived\
  \ at his property, he offered them coffee and asked if they wanted to see his operation.\
  \ He seemed proud of it. Meanwhile, Pelletier's undercover officers were infiltrating\
  \ what she described, with visible discomfort, as the maple syrup black market.\n\
  It operates out of pancake houses. Diners. Sugar shacks. We had officers sitting\
  \ in IHOP parking lots for three weeks, watching transactions. One of them gained\
  \ nine pounds. He filed for hazard pay. It was denied.\nOver the course of the investigation,\
  \ Pelletier became, somewhat against her will, one of the province's foremost experts\
  \ on maple syrup.\nI can tell you the difference between Grade A Golden and Grade\
  \ A Dark by smell alone. I have a certificate in syrup grading from the International\
  \ Maple Syrup Institute. It is framed next to my commendation for bravery. They\
  \ are the same size.\nPriorities.\nBy early 2013, Pelletier had mapped the entire\
  \ operation. She knew who stole the syrup, who moved it, who sold it, and where\
  \ the money went. She had twenty-two suspects across three provinces. She was ready\
  \ to move. But coordinating arrests across Quebec, Ontario, and New Brunswick required\
  \ planning. And then there was the matter of the international border.\nSome of\
  \ the syrup had been sold in Vermont. Which meant we needed cooperation from American\
  \ law enforcement. I called the FBI field office in Burlington, Vermont.\nThere\
  \ was a very long silence on the other end of the phone.\nWhat did they say?\nThe\
  \ agent asked me to repeat myself. And then he asked me if this was a prank. And\
  \ then he put me on hold for nine minutes. When he came back, he said, and I quote,\
  \ \"Ma'am, we will... look into it.\"\nThe full resources of the Federal Bureau\
  \ of Investigation, brought to bear on maple syrup.\nTo their credit, the FBI did\
  \ cooperate. Eventually. After Pelletier sent them a forty-page briefing document\
  \ with colour-coded charts and a glossary of maple syrup terminology.\nI included\
  \ a glossary because the first agent I spoke with did not know what a sugar bush\
  \ was. I did not want that to be an obstacle.\nPelletier told me there was a moment,\
  \ late one night in her office, surrounded by shipping manifests and syrup grading\
  \ charts, when she stepped back and looked at the evidence board. Photographs, red\
  \ string, pushpins. A map of eastern North America with arrows connecting sugar\
  \ shacks to warehouses to diners to bank accounts.\nIt looked exactly like a narcotics\
  \ investigation. Exactly. Except instead of cocaine, every single arrow pointed\
  \ to breakfast.\nThe pieces were in place. The warrants were drafted. The task force\
  \ was coordinated across four jurisdictions. For maple syrup. The net was closing.\
  \ Sergeant Pelletier had mapped the entire operation. She knew who stole the syrup,\
  \ who moved it, who sold it, and where the money went. Twenty-two suspects. Three\
  \ provinces. One very long FBI phone call.\nNext time, on the final episode of The\
  \ Sticky Fingers: the arrests, the trials, and the man who appealed his maple syrup\
  \ conviction all the way to the Supreme Court of Canada.\nThey found him making\
  \ pancakes. With the stolen syrup.\nYou cannot make this up.\nWe keep saying that.\
  \ It keeps being true."

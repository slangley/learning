transcript: "9:04 and 35 seconds. That's when it happened. The morning of December\
  \ 6th, 1917. A French cargo ship called the *Mont-Blanc* — loaded with 2,300 tonnes\
  \ of wet picric acid, 200 tonnes of TNT, 10 tonnes of gun cotton, and 35 tonnes\
  \ of benzol stored in drums on deck — had been burning for twenty minutes. She had\
  \ drifted to Pier 6, in the narrows of Halifax Harbour. Around her, people had come\
  \ out of their homes and offices to watch the fire. Children were pressed against\
  \ schoolroom windows. Sailors from nearby ships had rowed over to help. When the\
  \ *Mont-Blanc* detonated, it released energy equivalent to approximately 2.9 kilotons\
  \ of TNT. It was the largest human-made explosion in history up to that point —\
  \ a record it would hold until the Trinity nuclear test in 1945. The entire Richmond\
  \ district of Halifax was erased in seconds. Two kilometres of waterfront was destroyed.\
  \ 1,782 people died. Nine thousand were injured. Hundreds were blinded by flying\
  \ glass as they stood at their windows watching the fire. This is Episode 4. We're\
  \ going to talk about how Halifax got to that morning, what happened during it,\
  \ and what the city became in its aftermath — including its pivotal role in the\
  \ Second World War, the longest continuous military campaign in history.\nBefore\
  \ we get to 1917, we need to spend a moment in 1867. Because you can't understand\
  \ the Halifax of the First World War without understanding what Confederation did\
  \ to the city. Nova Scotia was dragged into Confederation. That is not an overstatement.\
  \ The provincial government agreed to join the new Dominion of Canada in 1867, but\
  \ the *people* of Nova Scotia emphatically did not. In the joint provincial and\
  \ federal elections held immediately after Confederation, the Anti-Confederation\
  \ Party won 36 of 38 seats in the provincial legislature. Of Nova Scotia's 19 seats\
  \ in the new federal parliament in Ottawa, 18 went to anti-Confederation candidates.\
  \ The man who led that resistance was Joseph Howe — one of the great figures of\
  \ Nova Scotian history. Howe was a newspaper editor, an orator of remarkable power,\
  \ a politician who had already led the fight for responsible government in Nova\
  \ Scotia decades earlier. He had toured Britain arguing against Confederation with\
  \ a clarity that was hard to dismiss. He asked, in the *Halifax Chronicle*, \"Did\
  \ anybody ever propose to unite Scotland with Poland or Hungary? Inland countries\
  \ 800 miles off in the very heart of Europe?\" He meant Canada West — what is now\
  \ Ontario — which Nova Scotians viewed as distant, alien, and likely to use the\
  \ new federation to serve its own interests at the Maritimes' expense. Howe was\
  \ right about many things. After Confederation, freight rates on the railways consistently\
  \ favoured central Canada. The National Policy — the tariff system introduced by\
  \ John A. Macdonald in 1879 — benefited manufacturing in Ontario and Quebec and\
  \ raised the cost of imported goods for Maritimers who didn't have the same manufacturing\
  \ base to fall back on. Halifax's old role as a trading port began to erode. The\
  \ wooden shipbuilding industry that had been the backbone of Nova Scotia's economy\
  \ couldn't compete with steam-powered steel ships. One by one, the economic foundations\
  \ of the old Halifax began to give way. Howe eventually gave up the fight and joined\
  \ the federal Cabinet, deciding he could do more for Nova Scotia from inside than\
  \ outside. The resentment he left behind never entirely went away. There is a strain\
  \ of Maritime alienation from Ottawa that runs straight from Joseph Howe's Anti-Confederation\
  \ rallies in 1867 to letters to the editor in Halifax newspapers today. By the time\
  \ the First World War began in 1914, Halifax was leaner than it had been in its\
  \ privateer heyday — but it was still the most important military port on the Atlantic\
  \ coast of North America. And the war was about to make it matter again.\n[Ad Break]\n\
  \  Are you a small maritime province feeling economically marginalized by a distant\
  \ federal government?\n  Introducing the Official Maritime Grievance Journal — leatherbound,\
  \ 500 pages, barely dents the surface.\n  Log freight rate injustices! Tariff inequities!\
  \ The time Ottawa forgot you existed for six whole months!\n  Comes with a complimentary\
  \ sigh. Very long. Very Maritime.\n  The Official Maritime Grievance Journal. Because\
  \ feelings deserve documentation.\n[End Ad Break]\nHalifax in the autumn of 1914\
  \ becomes, almost instantaneously, the most important port in Canada. Every Canadian\
  \ soldier sailing to Europe leaves from here. Every supply convoy assembling for\
  \ the voyage to Britain forms up in Bedford Basin — the enormous body of water just\
  \ north of the Narrows. The city that had been quietly fading into second-tier status\
  \ is suddenly the beating pulse of Canada's war effort. Bedford Basin, for those\
  \ who haven't seen it, is remarkable. It is a nearly circular body of water about\
  \ five kilometres across, connected to the outer harbour by the Narrows — a channel\
  \ perhaps 700 metres wide. Dozens of ships could anchor in the Basin at once, sheltered,\
  \ organized, prepared. When the First World War created convoy duty, the Basin became\
  \ the most important marshalling yard on the western side of the Atlantic. The city\
  \ swelled. Soldiers in transit, naval officers, munitions workers, merchants supplying\
  \ the war effort — Halifax's population, which had been stagnant for decades, suddenly\
  \ boomed. Housing was tight. The waterfront was chaotic. The streets were full of\
  \ uniformed men from a dozen countries. And through that busy, crowded harbour,\
  \ on the morning of December 6th, 1917, came the *Mont-Blanc* and the *Imo*. The\
  \ *Mont-Blanc* was a French cargo vessel. She had loaded her cargo of high explosives\
  \ — destined for the war effort in France — in New York and was sailing north to\
  \ join a convoy assembling in Bedford Basin. The *Imo* was a Norwegian ship, chartered\
  \ by the Commission for Relief in Belgium, sailing out of the Basin to pick up supplies.\
  \ They were both in the Narrows at the same time, and in a series of miscommunications\
  \ and navigational errors that took years of inquiry to fully unravel, they collided.\
  \ The collision itself was almost gentle — the ships were moving slowly, and the\
  \ impact was more of a grinding scrape than a crash. But the *Mont-Blanc*'s deck\
  \ was stacked with drums of benzol — the most volatile of her cargo. The friction\
  \ of the collision ignited them. Fire broke out on deck. For twenty minutes, the\
  \ *Mont-Blanc* burned and drifted toward the pier. The crew, knowing what their\
  \ ship was carrying, abandoned it and rowed desperately for the Dartmouth shore,\
  \ shouting warnings that most people on the shore could not hear or did not understand.\
  \ People came out to watch the burning ship. They thought it was dramatic. They\
  \ had no idea.\nLet's talk about Vince Coleman for a moment. Because in a story\
  \ that is largely about catastrophe and chaos, Vince Coleman is the point of light.\
  \ Coleman was a train dispatcher for the Intercolonial Railway, working in the station\
  \ near Pier 6. When a sailor ran to the station warning of the *Mont-Blanc*'s cargo,\
  \ Coleman understood immediately what that meant. He knew that the overnight express\
  \ train from Saint John — carrying nearly three hundred passengers — was due to\
  \ arrive at 8:55 a.m. It would pull right into the blast zone. Coleman's colleague\
  \ ran. Coleman stayed. He went back to his telegraph key and began sending messages\
  \ down the line: *\"Munitions ship on fire. Making for Pier 6. Goodbye.\"* He sent\
  \ it repeatedly, to station after station, as far as Truro. The trains stopped.\
  \ The passengers lived. Vince Coleman died at his post when the *Mont-Blanc* exploded\
  \ at 9:04. He was 46 years old. Historians estimate his messages saved between 300\
  \ and 700 lives. The explosion itself is almost impossible to describe in terms\
  \ that convey the actual experience. The pressure wave from the blast was felt hundreds\
  \ of kilometres away. Windows shattered in Truro, 100 kilometres north. The *Mont-Blanc*'s\
  \ anchor shank — weighing over half a tonne — was found three kilometres from the\
  \ blast site. The mushroom cloud rose over three kilometres into the air. The tsunami\
  \ that followed the explosion swept over the waterfront and carried debris hundreds\
  \ of metres inland. The Richmond district — the working-class neighbourhood closest\
  \ to Pier 6 — was essentially levelled. Schools collapsed on the children inside\
  \ them. The Intercolonial Railway repair shops were destroyed. The sugar refinery\
  \ at the Narrows vanished. The Mi'kmaq community at Turtle Grove, on the Dartmouth\
  \ side of the harbour, was swept away by the tsunami. In total, the explosion destroyed\
  \ or damaged more than 12,000 buildings. And then, the next day, Halifax was hit\
  \ by the worst blizzard of the winter. With thousands of people sheltering in the\
  \ ruins of their homes, or in hastily erected emergency shelters, the snow fell.\
  \ The response to the disaster was one of the earliest examples of coordinated civilian\
  \ medical response to catastrophe in Canadian history. Halifax's hospitals were\
  \ overwhelmed within hours, and within days, relief trains were arriving from across\
  \ Canada and from Massachusetts. The Massachusetts–Halifax connection forged in\
  \ those days of disaster endures — the Christmas tree that Halifax sends to Boston\
  \ every year is still given in gratitude for that response.\n[Ad Break]\n  You know\
  \ what the most important invention in human history is?\n  Fire?\n  The telegraph.\
  \ A man named Vince Coleman proved it on December 6th, 1917, and saved hundreds\
  \ of lives with a few dots and dashes.\n  We take a lot of things for granted.\n\
  \  Yeah. We really do.\n  This ad was supposed to be funny. We got there eventually.\n\
  [End Ad Break]\nHalifax rebuilt. It had no choice, and it had a particular kind\
  \ of grim resilience that comes from having been a military port for nearly two\
  \ centuries. Within months, the worst of the wreckage was cleared. Within years,\
  \ new buildings were going up in the Richmond district. The inquiry into the explosion\
  \ dragged on for years and ultimately resolved nothing satisfying — both the *Mont-Blanc*'s\
  \ pilot and the harbour master were charged with manslaughter, the charges eventually\
  \ dropped. The city rebuilt. And then twenty years later, the world went to war\
  \ again. Halifax in the Second World War was arguably more critical than it had\
  \ ever been — including during its founding days as a counter to Louisbourg, including\
  \ during the Seven Years' War. Here is why. Britain, once Germany invaded Western\
  \ Europe in 1940, was dependent on supply convoys from North America to survive.\
  \ Not metaphorically dependent. Literally dependent. Without the food, the fuel,\
  \ the weapons, the machinery that crossed the Atlantic in convoy, Britain would\
  \ have starved and lost the war. The convoys that kept Britain alive assembled in\
  \ Halifax and Sydney, Nova Scotia. The ships that escorted them — and later, the\
  \ corvettes of the Royal Canadian Navy that formed the backbone of convoy escort\
  \ duty — were built, crewed, and maintained here. HX-1 — Halifax Convoy Number One\
  \ — sailed on September 16th, 1939, two weeks after war was declared. It was the\
  \ first of hundreds. By the end of the war, over 26,000 separate merchant ship voyages\
  \ had been made from Canada, delivering an average of 90,000 tonnes of war materials\
  \ per day to Britain and the Allies. The Battle of the Atlantic — the longest continuous\
  \ military campaign of the war, running from 1939 to 1945 — was in large part fought\
  \ to protect those convoys, and Halifax was where they were born. Bedford Basin\
  \ during the war years was one of the most remarkable sights in the world. Dozens\
  \ of ships at a time — freighters, tankers, troopships, naval escorts — gathered\
  \ and organized before making the crossing. The Basin was lit, even in wartime blackouts,\
  \ by the sheer concentration of vessels. The population of Halifax nearly doubled\
  \ again. Housing was once again catastrophically short. The city was overwhelmed\
  \ and magnificent. And then in 1945, it was over. The ships stopped coming. The\
  \ sailors went home. The port quieted. Halifax found itself, as it had after Waterloo,\
  \ as it had after every war — trying to figure out what it was supposed to be now\
  \ that it wasn't needed to fight.\nAfter 1945, Halifax faced something harder than\
  \ war or explosion: the long, quiet work of figuring out who it was. The city had\
  \ a military complex, a harbour, and some universities. It had complicated history\
  \ and not enough money. It had a population that included some of the oldest Black\
  \ communities in Canada — communities that had been there since the Loyalist era,\
  \ that had survived generations of deliberate neglect, and that were about to face\
  \ the most brazen act of institutional racism in the city's modern history. We're\
  \ going to talk about Africville in Episode 5. We're going to talk about what happens\
  \ when a city decides that some of its residents don't belong — and what it takes,\
  \ decades later, to begin to make that right. This is *The Warden of the North*.\
  \ We'll see you in Episode 5.\n- Wikipedia — Halifax Explosion (https://en.wikipedia.org/wiki/Halifax_Explosion)\
